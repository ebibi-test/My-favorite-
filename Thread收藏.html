<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread收藏✐☡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

  :root{
    --paper:#F3F8FD;
    --ink:#3A4A5C;
    --ink-soft:#94ABBE;
    --line:#D9E9F7;
    --line-soft:#E9F3FB;
    --card:#FFFFFF;
    --sky:#7FB8E8;
    --sky-soft:#EAF4FD;
    --sky-deep:#5A9BD4;
  }
  [data-theme="dark"]{
    --paper:#1B232E;
    --ink:#E4EDF6;
    --ink-soft:#7C8FA3;
    --line:#2E3D4F;
    --line-soft:#26323F;
    --card:#232E3C;
    --sky:#5A9BD4;
    --sky-soft:#2A3C4E;
    --sky-deep:#8FC4F2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Zen Maru Gothic', 'Nunito', sans-serif;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(var(--line-soft) 1.5px, transparent 1.5px);
    background-size:24px 24px;
    transition:background-color .2s ease, color .2s ease;
  }
  .wrap{max-width:720px;margin:0 auto;padding:36px 20px 80px;}

  /* Header */
  header.top{
    margin-bottom:20px;
  }
  .title-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:4px;
  }
  .title-row h1{flex:1;}
  .theme-toggle{
    flex-shrink:0;
    border:2px solid var(--line);
    background:var(--card);
    border-radius:50%;
    width:36px;height:36px;
    font-size:15px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    padding:0;
    transition:all .15s ease;
  }
  .theme-toggle:hover{border-color:var(--sky);background:var(--sky-soft);}
  .mark{
    flex-shrink:0;
  }
  header.top h1{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:26px;
    margin:0;
    font-weight:700;
    letter-spacing:0.02em;
    color:var(--sky-deep);
  }
  header.top .sub{
    font-size:11px;
    letter-spacing:0.15em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-left:38px;
  }
  header.top .underline{
    margin-top:14px;
    height:2px;
    background:repeating-linear-gradient(to right, var(--sky) 0 6px, transparent 6px 10px);
    border-radius:2px;
  }

  /* Top bar: add button + tabs */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:20px 0 16px;
    flex-wrap:wrap;
    gap:12px;
  }
  .tabs{display:flex;gap:6px;}
  .tab{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:13px;
    padding:8px 18px;
    background:var(--card);
    border:2px solid var(--sky);
    border-radius:20px;
    color:var(--sky-deep);
    cursor:pointer;
  }
  .tab.active{background:var(--sky-deep);color:#fff;border-color:var(--sky-deep);}

  .more-menu{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:13px;
    padding:8px 30px 8px 16px;
    background:var(--card);
    color:var(--sky-deep);
    border:2px solid var(--sky);
    border-radius:20px;
    cursor:pointer;
    -webkit-appearance:none;
    appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--sky-deep) 50%), linear-gradient(135deg, var(--sky-deep) 50%, transparent 50%);
    background-position: calc(100% - 16px) center, calc(100% - 11px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat:no-repeat;
  }
  .more-menu.active-view{background-color:var(--sky-deep);color:#fff;}
  .more-menu.active-view{
    background-image: linear-gradient(45deg, transparent 50%, #fff 50%), linear-gradient(135deg, #fff 50%, transparent 50%);
  }

  button{
    font-family:'Nunito', 'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:12.5px;
    letter-spacing:0.02em;
    border:2px solid var(--sky);
    background:var(--card);
    color:var(--sky-deep);
    padding:9px 18px;
    border-radius:20px;
    cursor:pointer;
    transition:all .15s ease;
  }
  button:hover{background:var(--sky-soft);}
  button.primary{
    font-family:'Zen Maru Gothic', sans-serif;
    background:var(--sky-deep);
    color:#fff;
    border-color:var(--sky-deep);
    box-shadow:0 3px 0 var(--line);
  }
  button.primary:hover{background:var(--sky-deep);opacity:0.9;}
  button.ghost{border-color:var(--line);color:var(--ink-soft);}
  button.ghost:hover{background:var(--line-soft);}
  button.random{
    background:var(--sky-soft);
    color:var(--sky-deep);
    border-color:var(--sky-soft);
  }
  button.random:hover{background:var(--sky);color:#fff;}

  /* Random review overlay */
  .review-card{
    background:var(--card);
    border:2px solid var(--sky);
    border-radius:20px;
    padding:24px;
    width:100%;max-width:440px;
    text-align:center;
  }
  .review-card .eyebrow{
    font-size:11px;
    font-weight:700;
    letter-spacing:0.15em;
    color:var(--sky-deep);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .review-card h3{
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:18px;
    margin:0 0 8px;
  }
  .review-card h3 a{color:var(--ink);text-decoration:none;border-bottom:2px solid var(--sky-soft);}
  .review-card .note{font-size:13px;color:var(--ink-soft);margin:8px 0;line-height:1.6;}
  .review-card .tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:10px 0;}
  .review-card .tag{
    font-size:10.5px;font-weight:700;padding:3px 11px;
    background:var(--sky-soft);color:var(--sky-deep);border-radius:20px;
  }
  .review-card .actions{display:flex;gap:8px;justify-content:center;margin-top:16px;}

  /* Controls */
  .controls{
    display:flex;
    gap:10px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .search-box{
    flex:1;
    min-width:160px;
    position:relative;
  }
  .search-box input{
    width:100%;
    padding:10px 14px 10px 36px;
    border:2px solid var(--line);
    background:var(--card);
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:13.5px;
    border-radius:20px;
    color:var(--ink);
  }
  .search-box input:focus{outline:none;border-color:var(--sky);}
  .search-box::before{
    content:"";
    position:absolute;
    left:14px;top:12px;
    width:10px;height:10px;
    border:2px solid var(--ink-soft);
    border-radius:50%;
  }
  .search-box::after{
    content:"";
    position:absolute;
    left:22px;top:20px;
    width:6px;height:2px;
    background:var(--ink-soft);
    transform:rotate(45deg);
    border-radius:1px;
  }

  /* Tag filter row */
  .tag-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  .tag-chip{
    font-size:11.5px;
    font-weight:700;
    letter-spacing:0.02em;
    padding:6px 13px;
    border:2px solid var(--line);
    border-radius:20px;
    cursor:pointer;
    color:var(--ink-soft);
    background:var(--card);
    transition:all .12s ease;
  }
  .tag-chip:hover{border-color:var(--sky);color:var(--sky-deep);}
  .tag-chip.active{
    background:var(--sky-deep);
    color:#fff;
    border-color:var(--sky-deep);
  }

  .saver-filter-row{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }
  .saver-chip{
    font-size:12px;
    font-weight:700;
    padding:6px 14px;
    border:2px solid var(--line);
    border-radius:20px;
    cursor:pointer;
    color:var(--ink-soft);
    background:var(--card);
    transition:all .12s ease;
  }
  .saver-chip:hover{border-color:var(--sky);color:var(--sky-deep);}
  .saver-chip.active{
    background:var(--sky-deep);
    color:#fff;
    border-color:var(--sky-deep);
  }

  #bulkToggleBtn.active{
    background:var(--sky-deep);
    color:#fff;
    border-color:var(--sky-deep);
  }
  .bulk-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    background:var(--sky-soft);
    border:2px solid var(--sky);
    border-radius:14px;
    padding:10px 14px;
    margin-bottom:12px;
  }
  .bulk-count{
    font-size:12.5px;
    font-weight:700;
    color:var(--sky-deep);
  }
  .bulk-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .bulk-actions select{
    padding:7px 28px 7px 12px;
    border:2px solid var(--line);
    background:var(--card);
    color:var(--ink);
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:12px;
    font-weight:700;
    border-radius:14px;
    cursor:pointer;
    -webkit-appearance:none;
    appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--sky-deep) 50%), linear-gradient(135deg, var(--sky-deep) 50%, transparent 50%);
    background-position: calc(100% - 14px) center, calc(100% - 9px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat:no-repeat;
  }
  .bulk-actions button{padding:7px 14px;font-size:12px;}

  .card-checkbox{
    position:absolute;
    top:14px; left:14px;
    width:20px;height:20px;
    cursor:pointer;
    accent-color: var(--sky-deep);
    display:none;
  }
  .bulk-mode .card-checkbox{display:block;}
  .bulk-mode .card{padding-left:46px;}
  .bulk-mode .card.checked{border-color:var(--sky); box-shadow:0 3px 0 var(--sky-soft);}

  /* Cards */
  #list{display:flex;flex-direction:column;gap:13px;}
  .card{
    background:var(--card);
    border:2px solid var(--line);
    border-radius:18px;
    padding:16px 20px;
    position:relative;
    box-shadow:0 3px 0 var(--line-soft);
  }
  .card-body{
    display:flex;
    gap:14px;
  }
  .card-cover{
    flex-shrink:0;
    width:64px;height:64px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid var(--line-soft);
  }
  .card-cover img{
    width:100%;height:100%;
    object-fit:cover;
  }
  .card-content{
    flex:1;
    min-width:0;
  }
  .card .title{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:16.5px;
    font-weight:700;
    margin:0 0 4px;
    word-break:break-word;
    padding-right:90px;
    color:var(--ink);
  }
  .card .title a{
    color:var(--ink);
    text-decoration:none;
    border-bottom:2px solid var(--sky-soft);
  }
  .card .title a:hover{border-bottom-color:var(--sky);}
  .card .note{
    font-size:13px;
    color:var(--ink-soft);
    margin:6px 0 10px;
    white-space:pre-wrap;
    line-height:1.65;
  }
  .card .meta{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:10px;
    flex-wrap:wrap;
  }
  .card .tags{display:flex;gap:6px;flex-wrap:wrap;}
  .card .tag{
    font-size:10.5px;
    font-weight:700;
    letter-spacing:0.02em;
    padding:3px 11px;
    background:var(--sky-soft);
    color:var(--sky-deep);
    border-radius:20px;
  }
  .card .tag.saver-tag{
    background:var(--line-soft);
    color:var(--ink-soft);
    border:1.5px solid var(--line);
  }
  .card .actions{display:flex;gap:6px;flex-shrink:0;}
  .card .actions button{padding:5px 12px;font-size:11px;}
  .card .pin-star{
    position:absolute;
    top:12px; right:14px;
  }
  .card .pin-btn{
    border:none;
    background:transparent;
    cursor:pointer;
    font-size:18px;
    padding:2px 4px;
    line-height:1;
    color:var(--line);
    transition:color .15s ease, transform .15s ease;
  }
  .card .pin-btn:hover{transform:scale(1.15);}
  .card .pin-btn.pinned{color:#FFC75A;}
  .card.is-pinned{border-color:#FFE2A8; box-shadow:0 3px 0 #FFF3DA;}
  .card .date{
    font-size:10.5px;
    font-weight:700;
    color:var(--ink-soft);
    position:absolute;
    top:18px; right:50px;
    letter-spacing:0.03em;
  }
  .card .note.collapsed{
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card .note-toggle{
    font-size:11px;
    font-weight:700;
    color:var(--sky-deep);
    cursor:pointer;
    display:inline-block;
    margin-top:2px;
  }

  /* Empty state */
  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    border:2px dashed var(--line);
    border-radius:18px;
  }
  .empty .big{
    display:block;
    margin:0 auto 14px;
    width:34px;
  }
  .empty p{font-size:12.5px;letter-spacing:0.03em;}

  /* ===== Date browse view ===== */
  #dateView{display:none;}
  #categoryView{display:none;}

  .quick-jump{
    display:flex;
    gap:8px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .quick-jump select{
    flex:1;
    min-width:140px;
    padding:9px 12px;
    border:2px solid var(--line);
    background:var(--card);
    color:var(--ink);
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:13px;
    font-weight:700;
    border-radius:14px;
    cursor:pointer;
    -webkit-appearance:none;
    appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--sky-deep) 50%), linear-gradient(135deg, var(--sky-deep) 50%, transparent 50%);
    background-position: calc(100% - 18px) center, calc(100% - 13px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat:no-repeat;
    padding-right:32px;
  }
  .quick-jump select:focus{outline:none;border-color:var(--sky);}
  #statsView{display:none;}

  .stats-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
    margin-bottom:18px;
  }
  .stat-box{
    background:var(--card);
    border:2px solid var(--line);
    border-radius:16px;
    padding:16px 18px;
    box-shadow:0 3px 0 var(--line-soft);
  }
  .stat-box .num{
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:28px;
    font-weight:700;
    color:var(--sky-deep);
    line-height:1.1;
  }
  .stat-box .label{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:4px;
    font-weight:700;
  }
  .stats-section{
    margin-bottom:20px;
  }
  .stats-section h3{
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:14px;
    color:var(--sky-deep);
    margin:0 0 10px;
  }
  .bar-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
    font-size:12.5px;
  }
  .bar-row .bar-label{
    width:70px;
    flex-shrink:0;
    font-weight:700;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .bar-row .bar-track{
    flex:1;
    height:10px;
    background:var(--line-soft);
    border-radius:6px;
    overflow:hidden;
  }
  .bar-row .bar-fill{
    height:100%;
    background:var(--sky);
    border-radius:6px;
  }
  .bar-row .bar-count{
    width:30px;
    text-align:right;
    color:var(--ink-soft);
    font-weight:700;
    flex-shrink:0;
  }
  .stale-item{
    background:var(--card);
    border:2px solid var(--line-soft);
    border-radius:14px;
    padding:11px 14px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    font-size:13px;
  }
  .stale-item .name{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .stale-item .days{font-size:11px;color:var(--ink-soft);flex-shrink:0;}

  .filter-banner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:var(--sky-soft);
    border:2px solid var(--sky);
    border-radius:14px;
    padding:10px 16px;
    margin-bottom:14px;
    font-size:13px;
    font-weight:700;
    color:var(--sky-deep);
  }
  .filter-banner .clear-filter{
    font-size:11px;
    border:none;
    background:#fff;
    color:var(--sky-deep);
    padding:5px 12px;
    border-radius:20px;
    cursor:pointer;
    font-weight:700;
  }
  .filter-banner .clear-filter:hover{background:var(--sky-deep);color:#fff;}
  .crumbs{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12.5px;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .crumbs .seg{cursor:pointer;}
  .crumbs .seg.current{color:var(--sky-deep);cursor:default;}
  .crumbs .seg:hover:not(.current){color:var(--sky-deep);}
  .crumbs .sep{color:var(--line);}

  .folder-list{display:flex;flex-direction:column;gap:10px;}
  .folder{
    background:var(--card);
    border:2px solid var(--line);
    border-radius:16px;
    padding:14px 18px;
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    transition:transform .12s ease, border-color .12s ease;
    box-shadow:0 3px 0 var(--line-soft);
  }
  .folder:hover{transform:translateX(2px);border-color:var(--sky);}
  .folder .ficon{
    flex-shrink:0;
    width:30px;height:30px;
  }
  .folder .info{flex:1;}
  .folder .info .name{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:15px;color:var(--ink);}
  .folder .info .count{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
  .folder .arrow{font-size:18px;color:var(--sky);font-weight:700;}
  .rename-btn{
    border:none;
    background:transparent;
    cursor:pointer;
    font-size:14px;
    padding:4px;
    flex-shrink:0;
    opacity:0.5;
    transition:opacity .12s ease;
  }
  .rename-btn:hover{opacity:1;}

  .link-list{display:flex;flex-direction:column;gap:10px;}
  .link-item{
    background:var(--card);
    border:2px solid var(--line-soft);
    border-radius:14px;
    padding:11px 14px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .link-item .thumb{
    width:40px;height:40px;
    border-radius:12px;
    flex-shrink:0;
    border:2px solid var(--sky-soft);
    background:var(--sky-soft);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .link-item .thumb img{width:20px;height:20px;}
  .link-item .thumb .fallback{font-size:14px;color:var(--sky-deep);}
  .link-item .info{flex:1;min-width:0;}
  .link-item .info .name{
    font-size:13.5px;
    font-weight:700;
    color:var(--ink);
    text-decoration:none;
    display:block;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .link-item .info .url{
    font-size:11px;
    color:var(--ink-soft);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .link-item .tags-mini{display:flex;gap:4px;flex-shrink:0;}
  .link-item .tags-mini .tag{font-size:10px;padding:2px 9px;}

  /* Modal */
  .overlay{
    position:fixed;inset:0;
    background:rgba(34,34,32,0.45);
    display:none;
    align-items:center;justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--card);
    border:2px solid var(--sky);
    width:100%;max-width:480px;
    padding:26px;
    border-radius:20px;
    max-height:90vh;
    overflow-y:auto;
  }
  .modal h2{
    font-family:'Zen Maru Gothic',sans-serif;
    margin:0 0 18px;
    font-size:19px;
    font-weight:700;
    color:var(--sky-deep);
    border-bottom:2px solid var(--sky-soft);
    padding-bottom:12px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin-bottom:5px;
  }
  .field input, .field textarea, .field select{
    width:100%;
    padding:10px 13px;
    border:2px solid var(--line);
    background:var(--sky-soft);
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:13.5px;
    border-radius:12px;
    resize:vertical;
    color:var(--ink);
    -webkit-text-fill-color:var(--ink);
  }
  .field input::placeholder, .field textarea::placeholder{
    color:var(--ink-soft);
    opacity:1;
    -webkit-text-fill-color:var(--ink-soft);
  }
  .field input:focus, .field textarea:focus, .field select:focus{
    outline:none;
    border-color:var(--sky);
    background:#fff;
  }
  .field .hint{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .field input[type="date"]{
    color-scheme: light;
  }
  [data-theme="dark"] .field input[type="date"]{
    color-scheme: dark;
  }
  .tag-input-row{
    display:flex;
    gap:8px;
  }
  .tag-input-row select{
    flex:0 0 38%;
    min-width:0;
  }
  .tag-input-row input{
    flex:1;
    min-width:0;
  }
  .tag-suggestions{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-top:8px;
  }
  .tag-suggestions .sugg-pill{
    font-size:11.5px;
    font-weight:700;
    padding:5px 12px;
    background:var(--sky-soft);
    color:var(--sky-deep);
    border:none;
    border-radius:20px;
    cursor:pointer;
    transition:all .12s ease;
  }
  .tag-suggestions .sugg-pill:hover{background:var(--sky);color:#fff;}
  .tag-suggestions .sugg-pill.used{opacity:0.4;}

  .cover-row{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .cover-preview{
    width:64px;height:64px;
    border-radius:12px;
    border:2px dashed var(--line);
    background:var(--sky-soft);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    flex-shrink:0;
  }
  .cover-preview img{
    width:100%;height:100%;
    object-fit:cover;
  }
  .cover-preview .cover-placeholder{
    font-size:9.5px;
    color:var(--ink-soft);
    text-align:center;
    padding:0 4px;
    line-height:1.3;
  }
  .cover-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .cover-actions button{padding:7px 14px;font-size:11.5px;}
  #f_cover{display:none;}

  .dup-hint{
    color:#E0935A !important;
    font-weight:700;
  }
  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    margin-top:20px;
    border-top:2px solid var(--sky-soft);
    padding-top:16px;
  }

  /* Footer / data tools */
  .data-tools{
    margin-top:32px;
    border-top:1px solid var(--line);
    padding-top:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
  }
  .data-tools .label{
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--ink-soft);
  }
  .data-tools .group{display:flex;gap:8px;flex-wrap:wrap;}
  input[type="file"]{display:none;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="title-row">
      <!-- tiny line-drawn raindrop mark -->
      <svg class="mark" width="28" height="32" viewBox="0 0 28 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 2 C6 13 3 20 3 24 C3 28.5 8 30 14 30 C20 30 25 28.5 25 24 C25 20 22 13 14 2 Z" stroke="#5A9BD4" stroke-width="1.8" fill="#EAF4FD"/>
        <path d="M9 22 C9 25 11.5 26.5 14 26.5" stroke="#5A9BD4" stroke-width="1.3" stroke-linecap="round" fill="none"/>
      </svg>
      <h1>Thread收藏✐☡</h1>
      <button class="theme-toggle" id="themeToggle" title="切換深色模式">🌙</button>
    </div>
    <div class="sub">個人連結收藏 · 私人</div>
    <div class="underline"></div>
  </header>

  <div class="topbar">
    <div class="tabs">
      <button class="tab active" data-view="list">全部收藏</button>
      <select id="moreMenu" class="more-menu">
        <option value="">📋 更多檢視…</option>
        <option value="category">分類總覽</option>
        <option value="date">依日期</option>
        <option value="stats">統計</option>
        <option value="random">🎲 隨機回顧</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="primary" id="addBtn">+ 新增收藏</button>
    </div>
  </div>

  <!-- ===== List View ===== -->
  <div id="listView">
    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜尋標題、筆記、連結、分類…">
      </div>
      <button class="ghost" id="bulkToggleBtn">多選</button>
    </div>
    <div class="saver-filter-row">
      <button class="saver-chip" data-saver="">全部</button>
      <button class="saver-chip" data-saver="小雞毛">🐤 小雞毛</button>
      <button class="saver-chip" data-saver="小白">🤍 小白</button>
    </div>
    <div id="bulkBar" class="bulk-bar" style="display:none;">
      <span class="bulk-count" id="bulkCount">已選 0 筆</span>
      <div class="bulk-actions">
        <select id="bulkAddTag">
          <option value="">＋ 加上分類…</option>
        </select>
        <button class="ghost" id="bulkDeleteBtn">刪除選取</button>
      </div>
    </div>
    <div id="filterBanner"></div>
    <div class="tag-row" id="tagRow"></div>
    <div id="list"></div>
  </div>

  <!-- ===== Category Overview ===== -->
  <div id="categoryView">
    <div class="saver-filter-row">
      <button class="saver-chip" data-saver="">全部</button>
      <button class="saver-chip" data-saver="小雞毛">🐤 小雞毛</button>
      <button class="saver-chip" data-saver="小白">🤍 小白</button>
    </div>
    <div class="quick-jump">
      <select id="categoryJump">
        <option value="">📁 快速跳轉分類…</option>
      </select>
    </div>
    <div id="categoryContent"></div>
  </div>

  <!-- ===== Date Browse View ===== -->
  <div id="dateView">
    <div class="saver-filter-row">
      <button class="saver-chip" data-saver="">全部</button>
      <button class="saver-chip" data-saver="小雞毛">🐤 小雞毛</button>
      <button class="saver-chip" data-saver="小白">🤍 小白</button>
    </div>
    <div class="quick-jump">
      <select id="dateJumpCategory">
        <option value="">📁 快速跳轉分類…</option>
      </select>
      <select id="dateJumpDate">
        <option value="">📅 快速跳轉日期…</option>
      </select>
    </div>
    <div class="crumbs" id="crumbs"></div>
    <div id="dateContent"></div>
  </div>

  <!-- ===== Stats View ===== -->
  <div id="statsView">
    <div id="statsContent"></div>
  </div>

  <div class="data-tools">
    <span class="label">資料 · 共 <span id="countLabel">0</span> 筆</span>
    <div class="group">
      <button class="ghost" id="exportHtmlBtn">匯出分享頁面</button>
      <button class="ghost" id="exportBtn">匯出 JSON</button>
      <button class="ghost" id="importBtn">匯入 JSON</button>
      <input type="file" id="fileInput" accept="application/json">
    </div>
  </div>

</div>

<!-- Random Review Modal -->
<div class="overlay" id="reviewOverlay">
  <div class="review-card" id="reviewCard"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">新增收藏</h2>
    <div class="field">
      <label>標題</label>
      <input type="text" id="f_title" placeholder="文章 / Thread 標題">
    </div>
    <div class="field">
      <label>連結</label>
      <input type="text" id="f_url" placeholder="https://...">
      <div class="hint" id="dupHint"></div>
    </div>
    <div class="field">
      <label>封面圖片（選填）</label>
      <div class="cover-row">
        <div class="cover-preview" id="coverPreview">
          <span class="cover-placeholder">尚未選擇圖片</span>
        </div>
        <div class="cover-actions">
          <button type="button" class="ghost" id="coverPickBtn">選擇圖片</button>
          <button type="button" class="ghost" id="coverRemoveBtn" style="display:none;">移除</button>
        </div>
        <input type="file" id="f_cover" accept="image/*">
      </div>
      <div class="hint">自己截圖上傳，做成卡片小封面（存在這台裝置裡，不會上傳到任何伺服器）</div>
    </div>
    <div class="field">
      <label>分類 / 標籤</label>
      <div class="tag-input-row">
        <select id="f_tags_select">
          <option value="">📁 選擇已有分類…</option>
        </select>
        <input type="text" id="f_tags" placeholder="用逗號分隔，例如：投資, 觀點, 之後再看">
      </div>
      <div class="hint">下拉選單可以快速加入用過的分類，也可以在輸入框自己打新分類（逗號分隔）。「依日期」會以第一個分類為主資料夾</div>
      <div class="tag-suggestions" id="tagSuggestions"></div>
    </div>
    <div class="field">
      <label>存入日期</label>
      <input type="date" id="f_date">
      <div class="hint">會用這個日期來分類在「依日期」檢視中</div>
    </div>
    <div class="field">
      <label>這是誰存的</label>
      <select id="f_saver">
        <option value="">— 不指定 —</option>
        <option value="小雞毛">小雞毛</option>
        <option value="小白">小白</option>
      </select>
    </div>
    <div class="field">
      <label>心得 / 筆記</label>
      <textarea id="f_note" rows="4" placeholder="寫點什麼，方便以後回想"></textarea>
    </div>
    <div class="modal-actions">
      <button class="ghost" id="cancelBtn">取消</button>
      <button class="primary" id="saveBtn">儲存</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'thread-collector-items-v1';
const LAST_SAVER_KEY = 'thread-collector-last-saver';
let items = [];
let editingId = null;
let activeTag = null;
let activeSaver = null; // '小雞毛' | '小白' | null
let bulkMode = false;
let bulkSelected = new Set();
let currentView = 'list';
let dateNav = { category: null, date: null }; // navigation state for date view

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    items = raw ? JSON.parse(raw) : [];
  }catch(e){ items = []; }
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}
function uid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(ts){
  const d = new Date(ts);
  return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');
}
function toDateInputValue(ts){
  const d = new Date(ts);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dateInputToTimestamp(value, fallback){
  // value is "YYYY-MM-DD"; preserve time-of-day from fallback (or now) for nicer ordering
  if(!value) return fallback || Date.now();
  const [y,m,d] = value.split('-').map(Number);
  const ref = new Date(fallback || Date.now());
  const dt = new Date(y, m-1, d, ref.getHours(), ref.getMinutes(), ref.getSeconds(), ref.getMilliseconds());
  return dt.getTime();
}
function getFavicon(url){
  try{
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64`;
  }catch(e){ return null; }
}
function getHostname(url){
  try{ return new URL(url).hostname; }catch(e){ return url; }
}

function getAllTags(){
  const set = new Set();
  items.forEach(it => (it.tags||[]).forEach(t => set.add(t)));
  return Array.from(set).sort();
}
function saverFilteredItems(){
  return activeSaver ? items.filter(it=>it.saver===activeSaver) : items;
}
function renameTag(oldName, newName){
  items.forEach(it=>{
    if(!it.tags) return;
    it.tags = it.tags.map(t=> t===oldName ? newName : t);
    // dedupe in case newName already existed in this item's tags
    it.tags = [...new Set(it.tags)];
  });
  if(activeTag === oldName) activeTag = newName;
  save();
}

/* ============ View switching ============ */
function switchView(view){
  currentView = view;
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.view === view);
  });
  const moreMenu = document.getElementById('moreMenu');
  if(view==='list'){
    moreMenu.value = '';
    moreMenu.classList.remove('active-view');
  }else{
    moreMenu.value = view;
    moreMenu.classList.add('active-view');
  }
  document.getElementById('listView').style.display = view==='list' ? '' : 'none';
  document.getElementById('categoryView').style.display = view==='category' ? '' : 'none';
  document.getElementById('dateView').style.display = view==='date' ? '' : 'none';
  document.getElementById('statsView').style.display = view==='stats' ? '' : 'none';
  if(view==='date'){
    dateNav = { category: null, date: null };
    renderDateView();
  }
  if(view==='category'){
    renderCategoryView();
  }
  if(view==='stats'){
    renderStatsView();
  }
  syncSaverChips();
}

/* ============ Category Overview ============ */
function renderCategoryView(){
  const content = document.getElementById('categoryContent');
  const counts = {};
  saverFilteredItems().forEach(it=>{
    (it.tags||[]).forEach(t=>{
      counts[t] = (counts[t]||0) + 1;
    });
  });
  const cats = Object.keys(counts).sort((a,b)=> counts[b]-counts[a] || a.localeCompare(b));

  // Populate quick-jump dropdown
  const jump = document.getElementById('categoryJump');
  jump.innerHTML = `<option value="">📁 快速跳轉分類…</option>` +
    cats.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)} (${counts[c]})</option>`).join('');
  jump.value = '';

  if(cats.length===0){
    content.innerHTML = `<div class="empty">${emptySvg()}<p>還沒有分類，新增收藏時打上分類就會出現在這裡</p></div>`;
    return;
  }
  const maxCount = Math.max(...cats.map(c=>counts[c]));
  content.innerHTML = `<div class="folder-list">${cats.map(cat=>{
    const ratio = counts[cat] / maxCount;
    const fontSize = 15 + ratio * 4; // 15px ~ 19px
    return `<div class="folder" data-cat="${escapeHtml(cat)}">
      ${folderIcon()}
      <div class="info">
        <div class="name" style="font-size:${fontSize.toFixed(1)}px">${escapeHtml(cat)}</div>
        <div class="count">共 ${counts[cat]} 筆</div>
      </div>
      <button class="rename-btn" data-cat="${escapeHtml(cat)}" title="重新命名分類">✏️</button>
      <div class="arrow">›</div>
    </div>`;
  }).join('')}</div>`;
  content.querySelectorAll('.rename-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const oldName = btn.dataset.cat;
      const newName = prompt(`將「${oldName}」重新命名為：`, oldName);
      if(newName && newName.trim() && newName.trim() !== oldName){
        renameTag(oldName, newName.trim());
        renderCategoryView();
      }
    });
  });
  content.querySelectorAll('.folder').forEach(f=>{
    f.addEventListener('click', ()=>{
      activeTag = f.dataset.cat;
      switchView('list');
      render();
    });
  });
}

/* ============ Stats View ============ */
function renderStatsView(){
  const content = document.getElementById('statsContent');
  if(items.length===0){
    content.innerHTML = `<div class="empty">${emptySvg()}<p>還沒有資料，新增收藏後這裡會顯示統計</p></div>`;
    return;
  }

  const now = Date.now();
  const DAY = 86400000;

  // Total count
  const total = items.length;
  const pinnedCount = items.filter(it=>it.pinned).length;

  // This week / this month counts
  const weekAgo = now - 7*DAY;
  const monthAgo = now - 30*DAY;
  const thisWeek = items.filter(it=>it.createdAt >= weekAgo).length;
  const thisMonth = items.filter(it=>it.createdAt >= monthAgo).length;

  // Category counts
  const catCounts = {};
  items.forEach(it=>{
    (it.tags||[]).forEach(t=>{
      catCounts[t] = (catCounts[t]||0) + 1;
    });
  });
  const topCats = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxCatCount = topCats.length ? topCats[0][1] : 1;

  // Stale items (oldest, not pinned)
  const stale = [...items]
    .filter(it=>!it.pinned)
    .sort((a,b)=>a.createdAt-b.createdAt)
    .slice(0,5);

  // Saver breakdown
  const saverCounts = {};
  items.forEach(it=>{
    const s = it.saver || '未指定';
    saverCounts[s] = (saverCounts[s]||0) + 1;
  });
  const saverEntries = Object.entries(saverCounts).sort((a,b)=>b[1]-a[1]);
  const maxSaverCount = saverEntries.length ? saverEntries[0][1] : 1;
  const saverIcon = (s)=> s==='小雞毛' ? '🐤' : s==='小白' ? '🤍' : '❔';

  content.innerHTML = `
    <div class="stats-grid">
      <div class="stat-box">
        <div class="num">${total}</div>
        <div class="label">總收藏數</div>
      </div>
      <div class="stat-box">
        <div class="num">${pinnedCount}</div>
        <div class="label">已置頂 ★</div>
      </div>
      <div class="stat-box">
        <div class="num">${thisWeek}</div>
        <div class="label">本週新增</div>
      </div>
      <div class="stat-box">
        <div class="num">${thisMonth}</div>
        <div class="label">本月新增</div>
      </div>
    </div>

    ${topCats.length ? `<div class="stats-section">
      <h3>📊 常用分類</h3>
      ${topCats.map(([cat,count])=>`
        <div class="bar-row">
          <span class="bar-label">${escapeHtml(cat)}</span>
          <span class="bar-track"><span class="bar-fill" style="width:${(count/maxCatCount*100).toFixed(0)}%"></span></span>
          <span class="bar-count">${count}</span>
        </div>
      `).join('')}
    </div>` : ''}

    ${saverEntries.length ? `<div class="stats-section">
      <h3>👥 收藏人分佈</h3>
      ${saverEntries.map(([s,count])=>`
        <div class="bar-row">
          <span class="bar-label">${saverIcon(s)} ${escapeHtml(s)}</span>
          <span class="bar-track"><span class="bar-fill" style="width:${(count/maxSaverCount*100).toFixed(0)}%"></span></span>
          <span class="bar-count">${count}</span>
        </div>
      `).join('')}
    </div>` : ''}

    ${stale.length ? `<div class="stats-section">
      <h3>⏳ 最久沒看的收藏</h3>
      ${stale.map(it=>{
        const days = Math.floor((now - it.createdAt)/DAY);
        return `<div class="stale-item">
          <span class="name">${escapeHtml(it.title || it.url || '(無標題)')}</span>
          <span class="days">${days} 天前</span>
        </div>`;
      }).join('')}
    </div>` : ''}
  `;
}

/* ============ List View ============ */
function syncSaverChips(){
  document.querySelectorAll('.saver-chip').forEach(chip=>{
    chip.classList.toggle('active', chip.dataset.saver === (activeSaver || ''));
  });
}

/* ============ Bulk Select ============ */
function toggleBulkMode(){
  bulkMode = !bulkMode;
  bulkSelected.clear();
  document.getElementById('bulkToggleBtn').classList.toggle('active', bulkMode);
  document.getElementById('listView').classList.toggle('bulk-mode', bulkMode);
  document.getElementById('bulkBar').style.display = bulkMode ? '' : 'none';
  if(bulkMode) populateBulkAddTag();
  render();
}
function populateBulkAddTag(){
  const select = document.getElementById('bulkAddTag');
  const tags = getAllTags();
  select.innerHTML = `<option value="">＋ 加上分類…</option>` +
    tags.map(t=>`<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  select.value = '';
}
function updateBulkBar(){
  document.getElementById('bulkCount').textContent = `已選 ${bulkSelected.size} 筆`;
}

function render(){
  renderFilterBanner();
  renderTags();
  renderList();
  syncSaverChips();
  if(bulkMode) updateBulkBar();
  document.getElementById('countLabel').textContent = items.length;
}

function renderFilterBanner(){
  const banner = document.getElementById('filterBanner');
  if(activeTag){
    banner.innerHTML = `<div class="filter-banner">
      <span>目前篩選：${escapeHtml(activeTag)}</span>
      <button class="clear-filter" id="clearFilterBtn">清除篩選</button>
    </div>`;
    document.getElementById('clearFilterBtn').addEventListener('click', ()=>{
      activeTag = null;
      render();
    });
  }else{
    banner.innerHTML = '';
  }
}

function renderTags(){
  const row = document.getElementById('tagRow');
  const tags = getAllTags();
  if(tags.length === 0){ row.innerHTML=''; return; }
  row.innerHTML = tags.map(t =>
    `<button class="tag-chip ${activeTag===t?'active':''}" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</button>`
  ).join('');
  row.querySelectorAll('.tag-chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const t = btn.dataset.tag;
      activeTag = (activeTag === t) ? null : t;
      render();
    });
  });
}

function renderList(){
  const list = document.getElementById('list');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = items.filter(it=>{
    if(activeTag && !(it.tags||[]).includes(activeTag)) return false;
    if(activeSaver && it.saver !== activeSaver) return false;
    if(!q) return true;
    const hay = [it.title, it.note, it.url, (it.tags||[]).join(' ')].join(' ').toLowerCase();
    return hay.includes(q);
  });

  filtered.sort((a,b)=> (b.pinned?1:0) - (a.pinned?1:0) || b.createdAt - a.createdAt);

  if(filtered.length === 0){
    list.innerHTML = `<div class="empty">${emptySvg()}<p>${items.length===0 ? '還沒有收藏 — 點右上角「+ 新增收藏」開始' : '找不到符合條件的項目'}</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(it => {
    const noteId = 'note-' + it.id;
    const isLong = (it.note||'').length > 60 || (it.note||'').split('\n').length > 2;
    return `
    <div class="card ${it.pinned?'is-pinned':''} ${it.cover?'has-cover':''} ${bulkSelected.has(it.id)?'checked':''}" data-id="${it.id}">
      <input type="checkbox" class="card-checkbox" ${bulkSelected.has(it.id)?'checked':''}>
      <span class="date">${formatDate(it.createdAt)}</span>
      <span class="pin-star">
        <button class="pin-btn ${it.pinned?'pinned':''}" title="置頂">${it.pinned ? '★' : '☆'}</button>
      </span>
      <div class="card-body">
        ${it.cover ? `<div class="card-cover"><img src="${it.cover}" alt=""></div>` : ''}
        <div class="card-content">
          <div class="title">
            ${it.url ? `<a href="${escapeHtml(it.url)}" target="_blank" rel="noopener">${escapeHtml(it.title || it.url)}</a>` : escapeHtml(it.title || '(無標題)')}
          </div>
          ${it.note ? `<div class="note ${isLong?'collapsed':''}" id="${noteId}">${escapeHtml(it.note)}</div>` : ''}
          ${(it.note && isLong) ? `<span class="note-toggle" data-target="${noteId}">展開</span>` : ''}
          <div class="meta">
            <div class="tags">
              ${(it.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}
              ${it.saver ? `<span class="tag saver-tag">${it.saver==='小雞毛'?'🐤':'🤍'} ${escapeHtml(it.saver)}</span>` : ''}
            </div>
            <div class="actions">
              <button class="edit-btn">編輯</button>
              <button class="ghost del-btn">刪除</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;}).join('');

  list.querySelectorAll('.card').forEach(card=>{
    const id = card.dataset.id;
    card.querySelector('.edit-btn').addEventListener('click', ()=> openModal(id));
    card.querySelector('.del-btn').addEventListener('click', ()=>{
      if(confirm('確定要刪除這項收藏嗎？')){
        items = items.filter(it=>it.id!==id);
        save();
        render();
        if(currentView==='date') renderDateView();
      }
    });
    card.querySelector('.pin-btn').addEventListener('click', ()=>{
      const it = items.find(i=>i.id===id);
      it.pinned = !it.pinned;
      save();
      render();
    });
    const toggle = card.querySelector('.note-toggle');
    if(toggle){
      toggle.addEventListener('click', ()=>{
        const note = document.getElementById(toggle.dataset.target);
        const collapsed = note.classList.toggle('collapsed');
        toggle.textContent = collapsed ? '展開' : '收合';
      });
    }
    const checkbox = card.querySelector('.card-checkbox');
    checkbox.addEventListener('change', ()=>{
      if(checkbox.checked) bulkSelected.add(id);
      else bulkSelected.delete(id);
      card.classList.toggle('checked', checkbox.checked);
      updateBulkBar();
    });
  });
}

function emptySvg(){
  return `<svg class="big" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 4 C10 18 6 26 6 30 C6 35 12 37 20 37 C28 37 34 35 34 30 C34 26 30 18 20 4 Z" stroke="#B8D6F0" stroke-width="1.8" fill="none" stroke-dasharray="3 3"/>
  </svg>`;
}

/* ============ Date Browse View ============ */
function renderDateView(){
  const content = document.getElementById('dateContent');
  const crumbs = document.getElementById('crumbs');

  // Build category > date > items map
  const tree = {};
  saverFilteredItems().forEach(it=>{
    const cat = (it.tags && it.tags[0]) ? it.tags[0] : '未分類';
    const day = formatDate(it.createdAt);
    if(!tree[cat]) tree[cat] = {};
    if(!tree[cat][day]) tree[cat][day] = [];
    tree[cat][day].push(it);
  });

  // Populate quick-jump dropdowns
  const catJump = document.getElementById('dateJumpCategory');
  const dateJump = document.getElementById('dateJumpDate');
  const allCats = Object.keys(tree).sort();
  catJump.innerHTML = `<option value="">📁 快速跳轉分類…</option>` +
    allCats.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  catJump.value = dateNav.category || '';

  if(dateNav.category && tree[dateNav.category]){
    const dayKeysForJump = Object.keys(tree[dateNav.category]).sort().reverse();
    dateJump.innerHTML = `<option value="">📅 快速跳轉日期…</option>` +
      dayKeysForJump.map(d=>`<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
    dateJump.value = dateNav.date || '';
    dateJump.disabled = false;
  }else{
    dateJump.innerHTML = `<option value="">📅 快速跳轉日期…</option>`;
    dateJump.value = '';
    dateJump.disabled = true;
  }

  // Breadcrumbs
  let crumbHtml = `<span class="seg ${!dateNav.category?'current':''}" data-step="root">依日期</span>`;
  if(dateNav.category){
    crumbHtml += `<span class="sep">›</span><span class="seg ${!dateNav.date?'current':''}" data-step="category">${escapeHtml(dateNav.category)}</span>`;
  }
  if(dateNav.date){
    crumbHtml += `<span class="sep">›</span><span class="seg current" data-step="date">${escapeHtml(dateNav.date)}</span>`;
  }
  crumbs.innerHTML = crumbHtml;
  crumbs.querySelectorAll('.seg').forEach(seg=>{
    seg.addEventListener('click', ()=>{
      const step = seg.dataset.step;
      if(step==='root'){ dateNav = {category:null,date:null}; }
      if(step==='category'){ dateNav.date = null; }
      renderDateView();
    });
  });

  // Level 1: category folders
  if(!dateNav.category){
    const cats = Object.keys(tree).sort();
    if(cats.length===0){
      content.innerHTML = `<div class="empty">${emptySvg()}<p>還沒有收藏，先去新增一筆吧</p></div>`;
      return;
    }
    content.innerHTML = `<div class="folder-list">${cats.map(cat=>{
      const days = tree[cat];
      const total = Object.values(days).reduce((s,arr)=>s+arr.length,0);
      const lastDay = Object.keys(days).sort().reverse()[0];
      return `<div class="folder" data-cat="${escapeHtml(cat)}">
        ${folderIcon()}
        <div class="info">
          <div class="name">${escapeHtml(cat)}</div>
          <div class="count">共 ${total} 筆 · 最近更新 ${lastDay}</div>
        </div>
        <div class="arrow">›</div>
      </div>`;
    }).join('')}</div>`;
    content.querySelectorAll('.folder').forEach(f=>{
      f.addEventListener('click', ()=>{
        dateNav.category = f.dataset.cat;
        renderDateView();
      });
    });
    return;
  }

  // Level 2: date folders within category
  if(dateNav.category && !dateNav.date){
    const days = tree[dateNav.category] || {};
    const dayKeys = Object.keys(days).sort().reverse();
    if(dayKeys.length===0){
      content.innerHTML = `<div class="empty">${emptySvg()}<p>這個分類目前沒有資料</p></div>`;
      return;
    }
    content.innerHTML = `<div class="folder-list">${dayKeys.map(day=>`
      <div class="folder" data-day="${escapeHtml(day)}">
        ${calendarIcon()}
        <div class="info">
          <div class="name">${escapeHtml(day)}</div>
          <div class="count">${days[day].length} 筆連結</div>
        </div>
        <div class="arrow">›</div>
      </div>
    `).join('')}</div>`;
    content.querySelectorAll('.folder').forEach(f=>{
      f.addEventListener('click', ()=>{
        dateNav.date = f.dataset.day;
        renderDateView();
      });
    });
    return;
  }

  // Level 3: links within category + date
  const dayItems = (tree[dateNav.category] && tree[dateNav.category][dateNav.date]) || [];
  if(dayItems.length===0){
    content.innerHTML = `<div class="empty">${emptySvg()}<p>沒有連結</p></div>`;
    return;
  }
  content.innerHTML = `<div class="link-list">${dayItems.map(it=>{
    const favicon = it.url ? getFavicon(it.url) : null;
    return `<div class="link-item" data-id="${it.id}">
      <div class="thumb">
        ${favicon ? `<img src="${favicon}" alt="" onerror="window.__faviconError(this)">` : linkFallbackIcon()}
      </div>
      <div class="info">
        <a class="name" href="${escapeHtml(it.url||'#')}" target="_blank" rel="noopener">${escapeHtml(it.title || it.url || '(無標題)')}</a>
        <div class="url">${escapeHtml(it.url ? getHostname(it.url) : '')}</div>
      </div>
      ${(it.tags && it.tags.length>1) ? `<div class="tags-mini">${it.tags.slice(1).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
    </div>`;
  }).join('')}</div>`;
}
window.__faviconError = function(imgEl){
  imgEl.parentElement.innerHTML = '<span class="fallback">🔗</span>';
};

    <path d="M3 8 L11 8 L13.5 11 L27 11 L27 24 L3 24 Z" stroke="#5A9BD4" stroke-width="1.8" fill="#EAF4FD" stroke-linejoin="round"/>

/* ============ Modal ============ */
function addTagToInput(tagToAdd){
  const tagsInput = document.getElementById('f_tags');
  const current = tagsInput.value.split(',').map(t=>t.trim()).filter(Boolean);
  if(!current.includes(tagToAdd)){
    current.push(tagToAdd);
    tagsInput.value = current.join(', ');
  }
}

function renderTagSuggestions(){
  const box = document.getElementById('tagSuggestions');
  const select = document.getElementById('f_tags_select');
  const tags = getAllTags();

  // Populate dropdown
  select.innerHTML = `<option value="">📁 選擇已有分類…</option>` +
    tags.map(t=>`<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  select.value = '';

  // Populate pill suggestions
  if(tags.length===0){ box.innerHTML=''; return; }
  box.innerHTML = tags.map(t=>`<button type="button" class="sugg-pill" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</button>`).join('');
  box.querySelectorAll('.sugg-pill').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      addTagToInput(btn.dataset.tag);
    });
  });
}

let currentCover = null; // base64 data URL or null

function setCoverPreview(dataUrl){
  currentCover = dataUrl || null;
  const preview = document.getElementById('coverPreview');
  const removeBtn = document.getElementById('coverRemoveBtn');
  if(currentCover){
    preview.innerHTML = `<img src="${currentCover}" alt="">`;
    removeBtn.style.display = '';
  }else{
    preview.innerHTML = `<span class="cover-placeholder">尚未選擇圖片</span>`;
    removeBtn.style.display = 'none';
  }
}

function checkDuplicateUrl(url, ignoreId){
  const hint = document.getElementById('dupHint');
  if(!url){ hint.textContent=''; hint.classList.remove('dup-hint'); return; }
  const dup = items.find(it=>it.url===url && it.id!==ignoreId);
  if(dup){
    hint.textContent = `⚠️ 你已經存過這篇了：「${dup.title || dup.url}」`;
    hint.classList.add('dup-hint');
  }else{
    hint.textContent='';
    hint.classList.remove('dup-hint');
  }
}

function openModal(id){
  editingId = id || null;
  const overlay = document.getElementById('overlay');
  if(id){
    const it = items.find(i=>i.id===id);
    document.getElementById('modalTitle').textContent = '編輯收藏';
    document.getElementById('f_title').value = it.title || '';
    document.getElementById('f_url').value = it.url || '';
    document.getElementById('f_tags').value = (it.tags||[]).join(', ');
    document.getElementById('f_note').value = it.note || '';
    document.getElementById('f_date').value = toDateInputValue(it.createdAt);
    document.getElementById('f_saver').value = it.saver || '';
    setCoverPreview(it.cover || null);
  }else{
    document.getElementById('modalTitle').textContent = '新增收藏';
    document.getElementById('f_title').value = '';
    document.getElementById('f_url').value = '';
    document.getElementById('f_tags').value = '';
    document.getElementById('f_note').value = '';
    document.getElementById('f_date').value = toDateInputValue(Date.now());
    document.getElementById('f_saver').value = localStorage.getItem(LAST_SAVER_KEY) || '';
    setCoverPreview(null);
    // Try to auto-fill URL from clipboard if it looks like a link
    if(navigator.clipboard && navigator.clipboard.readText){
      navigator.clipboard.readText().then(text=>{
        const trimmed = (text||'').trim();
        if(/^https?:\/\/\S+$/i.test(trimmed)){
          document.getElementById('f_url').value = trimmed;
          checkDuplicateUrl(trimmed, editingId);
        }
      }).catch(()=>{});
    }
  }
  document.getElementById('f_cover').value = '';
  checkDuplicateUrl(document.getElementById('f_url').value.trim(), editingId);
  renderTagSuggestions();
  overlay.classList.add('show');
  document.getElementById('f_title').focus();
}
function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  editingId = null;
}

function saveEntry(){
  const title = document.getElementById('f_title').value.trim();
  const url = document.getElementById('f_url').value.trim();
  const note = document.getElementById('f_note').value.trim();
  const dateVal = document.getElementById('f_date').value;
  const saver = document.getElementById('f_saver').value;
  const tags = document.getElementById('f_tags').value
    .split(',').map(t=>t.trim()).filter(Boolean);

  if(!title && !url){
    alert('請至少填寫標題或連結');
    return;
  }

  if(editingId){
    const it = items.find(i=>i.id===editingId);
    it.title = title; it.url = url; it.note = note; it.tags = tags;
    it.createdAt = dateInputToTimestamp(dateVal, it.createdAt);
    it.saver = saver;
    it.cover = currentCover;
  }else{
    items.push({
      id: uid(),
      title, url, note, tags,
      pinned: false,
      saver,
      cover: currentCover,
      createdAt: dateInputToTimestamp(dateVal, Date.now())
    });
  }
  if(saver){
    localStorage.setItem(LAST_SAVER_KEY, saver);
  }
  save();
  closeModal();
  render();
  if(currentView==='date') renderDateView();
}

function exportData(){
  const blob = new Blob([JSON.stringify(items, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Thread收藏_備份_${formatDate(Date.now())}.json`;
  document.body.appendChild(a);

}
function importData(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!Array.isArray(data)) throw new Error('格式錯誤');
      const valid = data.filter(d=>d && typeof d==='object');
      if(items.length>0){
        if(!confirm(`匯入 ${valid.length} 筆資料嗎？這會加到目前的清單後面（不會覆蓋現有資料）。`)) return;
      }
      valid.forEach(d=>{
        items.push({
          id: d.id || uid(),
          title: d.title || '',
          url: d.url || '',
          note: d.note || '',
          tags: Array.isArray(d.tags) ? d.tags : [],
          pinned: !!d.pinned,
          saver: d.saver || '',
          cover: d.cover || null,
          createdAt: d.createdAt || Date.now()
        });
      });
      save();
      render();
      if(currentView==='date') renderDateView();
      alert('匯入完成！');
    }catch(err){
      alert('匯入失敗：檔案格式不正確');
    }
  };
  reader.readAsText(file);
}

    <div class="actions">
      <button class="ghost" id="reviewClose">關閉</button>
      <button class="random" id="reviewAgain">🎲 再抽一個</button>
    </div>
  `;
  document.getElementById('reviewOverlay').classList.add('show');
  document.getElementById('reviewClose').addEventListener('click', ()=>{
    document.getElementById('reviewOverlay').classList.remove('show');
  });
  document.getElementById('reviewAgain').addEventListener('click', showRandomReview);
}

/* ============ Events ============ */
document.getElementById('moreMenu').addEventListener('change', (e)=>{
  const val = e.target.value;
  if(val === 'random'){
    showRandomReview();
    // reset back to whatever view was active (don't switch the page)
    e.target.value = (currentView==='list') ? '' : currentView;
  }else if(val){
    switchView(val);
  }else{
    switchView('list');
  }
});
document.getElementById('reviewOverlay').addEventListener('click', (e)=>{
  if(e.target.id==='reviewOverlay') document.getElementById('reviewOverlay').classList.remove('show');
});
document.getElementById('addBtn').addEventListener('click', ()=>openModal(null));
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('saveBtn').addEventListener('click', saveEntry);
document.getElementById('f_tags_select').addEventListener('change', (e)=>{
  if(e.target.value){
    addTagToInput(e.target.value);
    e.target.value = '';
  }
});
document.getElementById('coverPickBtn').addEventListener('click', ()=>{
  document.getElementById('f_cover').click();
});
document.getElementById('coverRemoveBtn').addEventListener('click', ()=>{
  setCoverPreview(null);
});
document.getElementById('f_cover').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  if(file.size > 2*1024*1024){
    alert('圖片太大了，請選擇 2MB 以內的圖片');
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev)=> setCoverPreview(ev.target.result);
  reader.readAsDataURL(file);
});
document.getElementById('f_url').addEventListener('input', (e)=>{
  checkDuplicateUrl(e.target.value.trim(), editingId);
});
document.getElementById('overlay').addEventListener('click', (e)=>{
  if(e.target.id==='overlay') closeModal();
});
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('bulkToggleBtn').addEventListener('click', toggleBulkMode);
document.getElementById('bulkDeleteBtn').addEventListener('click', ()=>{
  if(bulkSelected.size===0){ alert('還沒選取任何項目'); return; }
  if(confirm(`確定要刪除選取的 ${bulkSelected.size} 筆收藏嗎？`)){
    items = items.filter(it=>!bulkSelected.has(it.id));
    bulkSelected.clear();
    save();
    render();
    if(currentView==='date') renderDateView();
  }
});
document.getElementById('bulkAddTag').addEventListener('change', (e)=>{
  const tag = e.target.value;
  if(!tag || bulkSelected.size===0){
    if(bulkSelected.size===0 && tag) alert('還沒選取任何項目');
    e.target.value='';
    return;
  }
  items.forEach(it=>{
    if(bulkSelected.has(it.id)){
      it.tags = it.tags || [];
      if(!it.tags.includes(tag)) it.tags.push(tag);
    }
  });
  save();
  render();
  e.target.value = '';
});
document.querySelectorAll('.saver-chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    activeSaver = chip.dataset.saver || null;
    syncSaverChips();
    if(currentView==='list') render();
    else if(currentView==='category') renderCategoryView();
    else if(currentView==='date') renderDateView();
    else if(currentView==='stats') renderStatsView();
  });
});
document.getElementById('exportHtmlBtn').addEventListener('click', exportHtml);
document.getElementById('exportBtn').addEventListener('click', exportData);
document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', (e)=>{
  if(e.target.files[0]) importData(e.target.files[0]);
  e.target.value = '';
});
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>switchView(t.dataset.view));
});
document.addEventListener('keydown', (e)=>{
  if(e.key==='Escape'){
    closeModal();
    document.getElementById('reviewOverlay').classList.remove('show');
  }
  if(e.key==='Enter' && e.ctrlKey && document.getElementById('overlay').classList.contains('show')) saveEntry();

  // Quick-add shortcut: "/" opens the add modal, unless typing in a field
  if(e.key==='/' && !document.getElementById('overlay').classList.contains('show')){
    const tag = document.activeElement.tagName;
    if(tag !== 'INPUT' && tag !== 'TEXTAREA'){
      e.preventDefault();
      openModal(null);
    }
  }
});

/* ============ Quick-Jump Dropdowns ============ */
document.getElementById('categoryJump').addEventListener('change', (e)=>{
  const val = e.target.value;
  if(val){
    activeTag = val;
    switchView('list');
    render();
  }
});
document.getElementById('dateJumpCategory').addEventListener('change', (e)=>{
  dateNav.category = e.target.value || null;
  dateNav.date = null;
  renderDateView();
});
document.getElementById('dateJumpDate').addEventListener('change', (e)=>{
  if(e.target.value){
    dateNav.date = e.target.value;
    renderDateView();
  }
});

/* ============ Theme ============ */
const THEME_KEY = 'thread-collector-theme';
function applyTheme(theme){
  if(theme === 'dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeToggle').textContent = '☀️';
  }else{
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('themeToggle').textContent = '🌙';
  }
}
function loadTheme(){
  const saved = localStorage.getItem(THEME_KEY);
  applyTheme(saved === 'dark' ? 'dark' : 'light');
}
document.getElementById('themeToggle').addEventListener('click', ()=>{
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
});

load();
loadTheme();
render();
</script>
</body>
</html>
