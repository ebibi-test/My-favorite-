<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread收藏✐☡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

  :root{
    --paper:#F3F8FD;
    --ink:#3A4A5C;
    --ink-soft:#94ABBE;
    --line:#D9E9F7;
    --line-soft:#E9F3FB;
    --card:#FFFFFF;
    --sky:#7FB8E8;
    --sky-soft:#EAF4FD;
    --sky-deep:#5A9BD4;
  }
  [data-theme="dark"]{
    --paper:#1B232E;
    --ink:#E4EDF6;
    --ink-soft:#7C8FA3;
    --line:#2E3D4F;
    --line-soft:#26323F;
    --card:#232E3C;
    --sky:#5A9BD4;
    --sky-soft:#2A3C4E;
    --sky-deep:#8FC4F2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Zen Maru Gothic', 'Nunito', sans-serif;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(var(--line-soft) 1.5px, transparent 1.5px);
    background-size:24px 24px;
    transition:background-color .2s ease, color .2s ease;
  }
  .wrap{max-width:720px;margin:0 auto;padding:36px 20px 80px;}

  /* Header */
  header.top{
    margin-bottom:20px;
  }
  .title-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:4px;
  }
  .title-row h1{flex:1;}
  .theme-toggle{
    flex-shrink:0;
    border:2px solid var(--line);
    background:var(--card);
    border-radius:50%;
    width:36px;height:36px;
    font-size:15px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    padding:0;
    transition:all .15s ease;
  }
  .theme-toggle:hover{border-color:var(--sky);background:var(--sky-soft);}
  .mark{
    flex-shrink:0;
  }
  header.top h1{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:26px;
    margin:0;
    font-weight:700;
    letter-spacing:0.02em;
    color:var(--sky-deep);
  }
  header.top .sub{
    font-size:11px;
    letter-spacing:0.15em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-left:38px;
  }
  .sync-status{
    text-transform:none;
    letter-spacing:0;
    margin-left:6px;
    color:var(--sky-deep);
    word-break:break-all;
  }
  .sync-status.sync-error{
    color:#E0935A;
    display:block;
    margin-left:0;
    margin-top:4px;
  }
  header.top .underline{
    margin-top:14px;
    height:2px;
    background:repeating-linear-gradient(to right, var(--sky) 0 6px, transparent 6px 10px);
    border-radius:2px;
  }

  /* Top bar: add button + tabs */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:20px 0 16px;
    flex-wrap:wrap;
    gap:12px;
  }
  .tabs{display:flex;gap:6px;}
  .tab{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:13px;
    padding:8px 18px;
    background:var(--card);
    border:2px solid var(--sky);
    border-radius:20px;
    color:var(--sky-deep);
    cursor:pointer;
  }
  .tab.active{background:var(--sky-deep);color:#fff;border-color:var(--sky-deep);}

  .more-menu{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:13px;
    padding:8px 30px 8px 16px;
    background:var(--card);
    color:var(--sky-deep);
    border:2px solid var(--sky);
    border-radius:20px;
    cursor:pointer;
    -webkit-appearance:none;
    appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--sky-deep) 50%), linear-gradient(135deg, var(--sky-deep) 50%, transparent 50%);
    background-position: calc(100% - 16px) center, calc(100% - 11px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat:no-repeat;
  }
  .more-menu.active-view{background-color:var(--sky-deep);color:#fff;}
  .more-menu.active-view{
    background-image: linear-gradient(45deg, transparent 50%, #fff 50%), linear-gradient(135deg, #fff 50%, transparent 50%);
  }

  button{
    font-family:'Nunito', 'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:12.5px;
    letter-spacing:0.02em;
    border:2px solid var(--sky);
    background:var(--card);
    color:var(--sky-deep);
    padding:9px 18px;
    border-radius:20px;
    cursor:pointer;
    transition:all .15s ease;
  }
  button:hover{background:var(--sky-soft);}
  button.primary{
    font-family:'Zen Maru Gothic', sans-serif;
    background:var(--sky-deep);
    color:#fff;
    border-color:var(--sky-deep);
    box-shadow:0 3px 0 var(--line);
  }
  button.primary:hover{background:var(--sky-deep);opacity:0.9;}
  button.ghost{border-color:var(--line);color:var(--ink-soft);}
  button.ghost:hover{background:var(--line-soft);}
  button.random{
    background:var(--sky-soft);
    color:var(--sky-deep);
    border-color:var(--sky-soft);
  }
  button.random:hover{background:var(--sky);color:#fff;}

  /* Random review overlay */
  .review-card{
    background:var(--card);
    border:2px solid var(--sky);
    border-radius:20px;
    padding:24px;
    width:100%;max-width:440px;
    text-align:center;
  }
  .review-card .eyebrow{
    font-size:11px;
    font-weight:700;
    letter-spacing:0.15em;
    color:var(--sky-deep);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .review-card h3{
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:18px;
    margin:0 0 8px;
  }
  .review-card h3 a{color:var(--ink);text-decoration:none;border-bottom:2px solid var(--sky-soft);}
  .review-card .note{font-size:13px;color:var(--ink-soft);margin:8px 0;line-height:1.6;}
  .review-card .tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:10px 0;}
  .review-card .tag{
    font-size:10.5px;font-weight:700;padding:3px 11px;
    background:var(--sky-soft);color:var(--sky-deep);border-radius:20px;
  }
  .review-card .actions{display:flex;gap:8px;justify-content:center;margin-top:16px;}

  /* Controls */
  .controls{
    display:flex;
    gap:10px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .search-box{
    flex:1;
    min-width:160px;
    position:relative;
  }
  .search-box input{
    width:100%;
    padding:10px 14px 10px 36px;
    border:2px solid var(--line);
    background:var(--card);
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:13.5px;
    border-radius:20px;
    color:var(--ink);
  }
  .search-box input:focus{outline:none;border-color:var(--sky);}
  .search-box::before{
    content:"";
    position:absolute;
    left:14px;top:12px;
    width:10px;height:10px;
    border:2px solid var(--ink-soft);
    border-radius:50%;
  }
  .search-box::after{
    content:"";
    position:absolute;
    left:22px;top:20px;
    width:6px;height:2px;
    background:var(--ink-soft);
    transform:rotate(45deg);
    border-radius:1px;
  }

  /* Tag filter row */
  .tag-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }
  .cat-filter-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  .cat-filter-select{
    padding:8px 28px 8px 13px;
    border:2px solid var(--sky-soft);
    background:var(--sky-soft);
    color:var(--sky-deep);
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:12.5px;
    font-weight:700;
    border-radius:20px;
    cursor:pointer;
    -webkit-appearance:none;
    appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--sky-deep) 50%), linear-gradient(135deg, var(--sky-deep) 50%, transparent 50%);
    background-position: calc(100% - 12px) center, calc(100% - 7px) center;
    background-size: 4px 4px, 4px 4px;
    background-repeat:no-repeat;
    -webkit-text-fill-color:var(--sky-deep);
    transition:all .12s ease;
  }
  .cat-filter-select.has-value{
    background-color:var(--sky-deep);
    border-color:var(--sky-deep);
    color:#fff;
    -webkit-text-fill-color:#fff;
    background-image: linear-gradient(45deg, transparent 50%, #fff 50%), linear-gradient(135deg, #fff 50%, transparent 50%);
  }
  .tag-dropdown{
    flex:1;
    min-width:160px;
    padding:9px 30px 9px 14px;
    border:2px solid var(--sky);
    background:var(--card);
    color:var(--ink);
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:13px;
    font-weight:700;
    border-radius:20px;
    cursor:pointer;
    -webkit-appearance:none;
    appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--sky-deep) 50%), linear-gradient(135deg, var(--sky-deep) 50%, transparent 50%);
    background-position: calc(100% - 16px) center, calc(100% - 11px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat:no-repeat;
    -webkit-text-fill-color:var(--ink);
  }
  .tag-chip{
    font-size:11.5px;
    font-weight:700;
    letter-spacing:0.02em;
    padding:6px 13px;
    border:2px solid var(--line);
    border-radius:20px;
    cursor:pointer;
    color:var(--ink-soft);
    background:var(--card);
    transition:all .12s ease;
  }
  .tag-chip:hover{border-color:var(--sky);color:var(--sky-deep);}
  .tag-chip.active{
    background:var(--sky-deep);
    color:#fff;
    border-color:var(--sky-deep);
  }

  .saver-filter-row{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }
  .saver-chip{
    font-size:12px;
    font-weight:700;
    padding:6px 14px;
    border:2px solid var(--line);
    border-radius:20px;
    cursor:pointer;
    color:var(--ink-soft);
    background:var(--card);
    transition:all .12s ease;
  }
  .saver-chip:hover{border-color:var(--sky);color:var(--sky-deep);}
  .saver-chip.active{
    background:var(--sky-deep);
    color:#fff;
    border-color:var(--sky-deep);
  }

  #bulkToggleBtn.active{
    background:var(--sky-deep);
    color:#fff;
    border-color:var(--sky-deep);
  }
  .bulk-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    background:var(--sky-soft);
    border:2px solid var(--sky);
    border-radius:14px;
    padding:10px 14px;
    margin-bottom:12px;
  }
  .bulk-count{
    font-size:12.5px;
    font-weight:700;
    color:var(--sky-deep);
  }
  .bulk-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .bulk-actions select{
    padding:7px 28px 7px 12px;
    border:2px solid var(--line);
    background:var(--card);
    color:var(--ink);
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:12px;
    font-weight:700;
    border-radius:14px;
    cursor:pointer;
    -webkit-appearance:none;
    appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--sky-deep) 50%), linear-gradient(135deg, var(--sky-deep) 50%, transparent 50%);
    background-position: calc(100% - 14px) center, calc(100% - 9px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat:no-repeat;
  }
  .bulk-actions button{padding:7px 14px;font-size:12px;}

  .card-checkbox{
    width:18px;height:18px;
    cursor:pointer;
    accent-color: var(--sky-deep);
    display:none;
    flex-shrink:0;
  }
  .bulk-mode .card-checkbox{display:block;}
  .bulk-mode .card.checked{border-color:var(--sky); box-shadow:0 3px 0 var(--sky-soft);}

  /* Cards */
  #list{display:flex;flex-direction:column;gap:13px;}
  .card{
    background:var(--card);
    border:2px solid var(--line);
    border-radius:18px;
    padding:16px 20px;
    position:relative;
    box-shadow:0 3px 0 var(--line-soft);
  }
  .card-body{
    display:flex;
    gap:14px;
  }
  .card-cover{
    flex-shrink:0;
    width:64px;height:64px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid var(--line-soft);
  }
  .card-cover img{
    width:100%;height:100%;
    object-fit:cover;
  }
  .card-content{
    flex:1;
    min-width:0;
  }
  .cat-path{
    display:flex;
    align-items:center;
    gap:4px;
    flex-wrap:wrap;
    margin-bottom:5px;
    font-size:11px;
    font-weight:700;
    color:var(--sky-deep);
  }
  .cat-path .cat-sep{
    color:var(--line);
    font-size:10px;
  }
  .card .title{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:16.5px;
    font-weight:700;
    margin:0 0 4px;
    word-break:break-word;
    padding-right:90px;
    color:var(--ink);
  }
  .card .title a{
    color:var(--ink);
    text-decoration:none;
    border-bottom:2px solid var(--sky-soft);
  }
  .card .title a:hover{border-bottom-color:var(--sky);}
  .card .note{
    font-size:13px;
    color:var(--ink-soft);
    margin:6px 0 10px;
    white-space:pre-wrap;
    line-height:1.65;
  }
  .card .meta{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:10px;
    flex-wrap:wrap;
  }
  .card .tags{display:flex;gap:6px;flex-wrap:wrap;}
  .card .tag{
    font-size:10.5px;
    font-weight:700;
    letter-spacing:0.02em;
    padding:3px 11px;
    background:var(--sky-soft);
    color:var(--sky-deep);
    border-radius:20px;
  }
  .card .tag.saver-tag{
    background:var(--line-soft);
    color:var(--ink-soft);
    border:1.5px solid var(--line);
  }
  .card .actions{display:flex;gap:6px;flex-shrink:0;}
  .card .actions button{padding:5px 12px;font-size:11px;}
  .card .pin-star{
    display:flex;
    align-items:center;
    gap:2px;
  }
  .card .pin-btn{
    border:1.5px solid var(--line);
    background:transparent;
    cursor:pointer;
    font-size:11.5px;
    font-weight:700;
    padding:4px 10px;
    border-radius:20px;
    color:var(--ink-soft);
    transition:all .15s ease;
    font-family:'Zen Maru Gothic',sans-serif;
  }
  .card .pin-btn:hover{border-color:var(--sky);color:var(--sky-deep);}
  .card .pin-btn.pinned{
    background:#FFF3DA;
    border-color:#FFC75A;
    color:#B8860B;
  }
  .card.is-pinned{border-color:#FFE2A8; box-shadow:0 3px 0 #FFF3DA;}
  .card .visit-btn{
    border:1.5px solid var(--line);
    background:transparent;
    cursor:pointer;
    font-size:11.5px;
    font-weight:700;
    padding:4px 10px;
    border-radius:20px;
    color:var(--ink-soft);
    transition:all .15s ease;
    font-family:'Zen Maru Gothic',sans-serif;
  }
  .card .visit-btn:hover{border-color:#6DB87A;color:#4A9A5A;}
  .card .visit-btn.visited{
    background:#D6F0DA;
    border-color:#6DB87A;
    color:#3A7A48;
  }
  .card.is-visited{ border-color:#B8E0BF; box-shadow:0 3px 0 #D6F0DA; }
  .card.is-visited .title a{ text-decoration:line-through; opacity:0.7; }
  .card .card-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:6px;
  }
  .card .date{
    font-size:10.5px;
    font-weight:700;
    color:var(--ink-soft);
    letter-spacing:0.03em;
  }
  .card .note.collapsed{
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card .note-toggle{
    font-size:11px;
    font-weight:700;
    color:var(--sky-deep);
    cursor:pointer;
    display:inline-block;
    margin-top:2px;
  }

  /* Empty state */
  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    border:2px dashed var(--line);
    border-radius:18px;
  }
  .empty .big{
    display:block;
    margin:0 auto 14px;
    width:34px;
  }
  .empty p{font-size:12.5px;letter-spacing:0.03em;}



  .filter-banner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:var(--sky-soft);
    border:2px solid var(--sky);
    border-radius:14px;
    padding:10px 16px;
    margin-bottom:14px;
    font-size:13px;
    font-weight:700;
    color:var(--sky-deep);
  }
  .filter-banner .clear-filter{
    font-size:11px;
    border:none;
    background:#fff;
    color:var(--sky-deep);
    padding:5px 12px;
    border-radius:20px;
    cursor:pointer;
    font-weight:700;
  }
  .filter-banner .clear-filter:hover{background:var(--sky-deep);color:#fff;}
  .link-list{display:flex;flex-direction:column;gap:10px;}
  .link-item{
    background:var(--card);
    border:2px solid var(--line-soft);
    border-radius:14px;
    padding:11px 14px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .link-item .thumb{
    width:40px;height:40px;
    border-radius:12px;
    flex-shrink:0;
    border:2px solid var(--sky-soft);
    background:var(--sky-soft);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .link-item .thumb img{width:20px;height:20px;}
  .link-item .thumb .fallback{font-size:14px;color:var(--sky-deep);}
  .link-item .info{flex:1;min-width:0;}
  .link-item .info .name{
    font-size:13.5px;
    font-weight:700;
    color:var(--ink);
    text-decoration:none;
    display:block;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .link-item .info .url{
    font-size:11px;
    color:var(--ink-soft);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .link-item .tags-mini{display:flex;gap:4px;flex-shrink:0;}
  .link-item .tags-mini .tag{font-size:10px;padding:2px 9px;}

  /* Modal */
  .overlay{
    position:fixed;inset:0;
    background:rgba(34,34,32,0.45);
    display:none;
    align-items:center;justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--card);
    border:2px solid var(--sky);
    width:100%;max-width:480px;
    padding:26px;
    border-radius:20px;
    max-height:90vh;
    overflow-y:auto;
  }
  .modal h2{
    font-family:'Zen Maru Gothic',sans-serif;
    margin:0 0 18px;
    font-size:19px;
    font-weight:700;
    color:var(--sky-deep);
    border-bottom:2px solid var(--sky-soft);
    padding-bottom:12px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin-bottom:5px;
  }
  .field input, .field textarea, .field select{
    width:100%;
    padding:10px 13px;
    border:2px solid var(--line);
    background:var(--sky-soft);
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:13.5px;
    border-radius:12px;
    resize:vertical;
    color:var(--ink);
    -webkit-text-fill-color:var(--ink);
  }
  .field input::placeholder, .field textarea::placeholder{
    color:var(--ink-soft);
    opacity:1;
    -webkit-text-fill-color:var(--ink-soft);
  }
  .field input:focus, .field textarea:focus, .field select:focus{
    outline:none;
    border-color:var(--sky);
    background:#fff;
  }
  .field .hint{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .field input[type="date"]{
    color-scheme: light;
  }
  [data-theme="dark"] .field input[type="date"]{
    color-scheme: dark;
  }
  .tag-input-row{
    display:flex;
    gap:8px;
  }
  .tag-input-row select{
    flex:0 0 38%;
    min-width:0;
  }
  .tag-input-row input{
    flex:1;
    min-width:0;
  }
  .cat-input-row{
    display:flex;
    gap:8px;
  }
  .cat-select{
    flex:0 0 45%;
    min-width:0;
    padding:9px 28px 9px 12px;
    border:2px solid var(--line);
    background:var(--sky-soft);
    color:var(--ink);
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:13px;
    font-weight:700;
    border-radius:12px;
    -webkit-appearance:none;

<script>
const SUPABASE_URL = 'https://yxurrhlpffropktfxnki.supabase.co';
const SUPABASE_KEY = 'sb_publishable_bATnGvOH1xASqxl4Qfpi9Q_IRF9wA8b';
const SB_TABLE = 'thread_items';
const LAST_SAVER_KEY = 'thread-collector-last-saver';
let items = [];
let editingId = null;
let activeSaver = null;
let activeCat1 = null;
let activeCat2 = null;
let bulkMode = false;
let bulkSelected = new Set();
let currentView = 'list';

/* ============ Supabase REST helpers ============ */
function sbHeaders(extra){
  return Object.assign({
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json'
  }, extra||{});
}
// Convert local item (camelCase, createdAt) -> DB row (snake_case, entry_date)
function itemToRow(it){
  return {
    id: it.id,
    title: it.title || '',
    url: it.url || '',
    note: it.note || '',
    tags: (it.tags||[]).join(','),
    pinned: !!it.pinned,
    visited: !!it.visited,
    saver: it.saver || '',
    cover: it.cover || null,
    entry_date: it.createdAt || Date.now(),
    cat1: it.cat1 || null,
    cat2: it.cat2 || null,
    cat3: it.cat3 || null
  };
}
function rowToItem(row){
  return {
    id: row.id,
    title: row.title || '',
    url: row.url || '',
    note: row.note || '',
    tags: row.tags ? row.tags.split(',').map(t=>t.trim()).filter(Boolean) : [],
    pinned: !!row.pinned,
    visited: !!row.visited,
    saver: row.saver || '',
    cover: row.cover || null,
    createdAt: row.entry_date || Date.now(),
    cat1: row.cat1 || null,
    cat2: row.cat2 || null,
    cat3: row.cat3 || null
  };
}
async function sbFetchAll(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${SB_TABLE}?select=*`, {
    headers: sbHeaders()
  });
  if(!res.ok) throw new Error('Fetch failed: ' + res.status);
  const rows = await res.json();
  return rows.map(rowToItem);
}
async function sbUpsert(item){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${SB_TABLE}?on_conflict=id`, {
    method: 'POST',
    headers: sbHeaders({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
    body: JSON.stringify(itemToRow(item))
  });
  if(!res.ok) throw new Error('Upsert failed: ' + res.status + ' ' + await res.text());
}
async function sbUpsertMany(itemsArr){
  if(itemsArr.length===0) return;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${SB_TABLE}?on_conflict=id`, {
    method: 'POST',
    headers: sbHeaders({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
    body: JSON.stringify(itemsArr.map(itemToRow))
  });
  if(!res.ok) throw new Error('Bulk upsert failed: ' + res.status + ' ' + await res.text());
}
async function sbDelete(id){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${SB_TABLE}?id=eq.${encodeURIComponent(id)}`, {
    method: 'DELETE',
    headers: sbHeaders({ 'Prefer': 'return=minimal' })
  });
  if(!res.ok) throw new Error('Delete failed: ' + res.status);
}
async function sbDeleteMany(ids){
  if(ids.length===0) return;
  const idList = ids.map(id=>`"${id}"`).join(',');
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${SB_TABLE}?id=in.(${idList})`, {
    method: 'DELETE',
    headers: sbHeaders({ 'Prefer': 'return=minimal' })
  });
  if(!res.ok) throw new Error('Bulk delete failed: ' + res.status);
}

let syncStatusEl = null;
function setSyncStatus(text, isError){
  if(!syncStatusEl) syncStatusEl = document.getElementById('syncStatus');
  if(!syncStatusEl) return;
  syncStatusEl.textContent = text;
  syncStatusEl.classList.toggle('sync-error', !!isError);
  if(text && !isError){
    setTimeout(()=>{ if(syncStatusEl.textContent===text) syncStatusEl.textContent=''; }, 2000);
  }
}

async function load(){
  setSyncStatus('☁️ 同步中…');
  try{
    items = await sbFetchAll();
    setSyncStatus('✓ 已同步');
  }catch(e){
    console.error(e);
    setSyncStatus('⚠️ 連線失敗，請檢查網路', true);
    items = [];
  }
}
function uid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(ts){
  const d = new Date(ts);
  return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');
}
function toDateInputValue(ts){
  const d = new Date(ts);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dateInputToTimestamp(value, fallback){
  // value is "YYYY-MM-DD"; preserve time-of-day from fallback (or now) for nicer ordering
  if(!value) return fallback || Date.now();
  const [y,m,d] = value.split('-').map(Number);
  const ref = new Date(fallback || Date.now());
  const dt = new Date(y, m-1, d, ref.getHours(), ref.getMinutes(), ref.getSeconds(), ref.getMilliseconds());
  return dt.getTime();
}
function getFavicon(url){
  try{
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64`;
  }catch(e){ return null; }
}
function getHostname(url){
  try{ return new URL(url).hostname; }catch(e){ return url; }
}


/* ============ View switching ============ */
function switchView(view){
  currentView = view;
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.view === view);
  });
  document.getElementById('listView').style.display = view==='list' ? '' : 'none';
  syncSaverChips();
}


/* ============ List View ============ */
function syncSaverChips(){
  document.querySelectorAll('.saver-chip').forEach(chip=>{
    chip.classList.toggle('active', chip.dataset.saver === (activeSaver || ''));
  });
}

/* ============ Bulk Select ============ */
function toggleBulkMode(){
  bulkMode = !bulkMode;
  bulkSelected.clear();
  document.getElementById('bulkToggleBtn').classList.toggle('active', bulkMode);
  document.getElementById('listView').classList.toggle('bulk-mode', bulkMode);
  document.getElementById('bulkBar').style.display = bulkMode ? '' : 'none';
  render();
}
function updateBulkBar(){
  document.getElementById('bulkCount').textContent = `已選 ${bulkSelected.size} 筆`;
}

function render(){
  renderFilterBanner();
  renderCatFilter();
  renderList();
  syncSaverChips();
  if(bulkMode) updateBulkBar();
  document.getElementById('countLabel').textContent = items.length;
}

function renderCatFilter(){
  const row = document.getElementById('cat1FilterRow');
  const tree = getCatTree();
  const cat1s = Object.keys(tree).sort();
  if(cat1s.length === 0){ row.innerHTML = ''; return; }

  let html = `<select class="cat-filter-select ${activeCat1?'has-value':''}" id="catFilter1">
    <option value="">全部大類</option>
    ${cat1s.map(c=>`<option value="${escapeHtml(c)}" ${activeCat1===c?'selected':''}>${escapeHtml(c)}</option>`).join('')}
  </select>`;

  if(activeCat1 && tree[activeCat1]){
    const cat2s = Object.keys(tree[activeCat1]).sort();
    if(cat2s.length > 0){
      html += `<select class="cat-filter-select ${activeCat2?'has-value':''}" id="catFilter2">
        <option value="">全部中類</option>
        ${cat2s.map(c=>`<option value="${escapeHtml(c)}" ${activeCat2===c?'selected':''}>${escapeHtml(c)}</option>`).join('')}
      </select>`;
    }
  }
  row.innerHTML = html;

  document.getElementById('catFilter1').addEventListener('change', (e)=>{
    activeCat1 = e.target.value || null;
    activeCat2 = null;
    render();
  });
  const f2 = document.getElementById('catFilter2');
  if(f2) f2.addEventListener('change', (e)=>{
    activeCat2 = e.target.value || null;
    render();
  });
}

function renderFilterBanner(){ document.getElementById("filterBanner").innerHTML = ""; }


function renderList(){
  const list = document.getElementById('list');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = items.filter(it=>{
    if(activeSaver && it.saver !== activeSaver) return false;
    if(activeCat1 && it.cat1 !== activeCat1) return false;
    if(activeCat2 && it.cat2 !== activeCat2) return false;
    if(!q) return true;
    const hay = [it.title, it.note, it.url, (it.tags||[]).join(' '), it.cat1, it.cat2, it.cat3].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  });

  filtered.sort((a,b)=> (b.pinned?1:0) - (a.pinned?1:0) || b.createdAt - a.createdAt);

  if(filtered.length === 0){
    list.innerHTML = `<div class="empty">${emptySvg()}<p>${items.length===0 ? '還沒有收藏 — 點右上角「+ 新增收藏」開始' : '找不到符合條件的項目'}</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(it => {
    const noteId = 'note-' + it.id;
    const isLong = (it.note||'').length > 60 || (it.note||'').split('\n').length > 2;
    return `
    <div class="card ${it.pinned?'is-pinned':''} ${it.visited?'is-visited':''} ${it.cover?'has-cover':''} ${bulkSelected.has(it.id)?'checked':''}" data-id="${it.id}">
      <div class="card-top">
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" class="card-checkbox" ${bulkSelected.has(it.id)?'checked':''}>
          <span class="date">${formatDate(it.createdAt)}</span>
        </div>
        <span class="pin-star">
          <button class="pin-btn ${it.pinned?'pinned':''}" title="置頂">${it.pinned ? '★ 已收藏' : '☆ 收藏'}</button>
          <button class="visit-btn ${it.visited?'visited':''}" title="${it.visited?'Done':'標記 Done'}">${it.visited ? '✓ Done' : '○ Done?'}</button>
        </span>
      </div>
      <div class="card-body">
        ${it.cover ? `<div class="card-cover"><img src="${it.cover}" alt=""></div>` : ''}
        <div class="card-content">
          ${(it.cat1) ? `<div class="cat-path">${[it.cat1, it.cat2, it.cat3].filter(Boolean).map(c=>`<span>${escapeHtml(c)}</span>`).join('<span class="cat-sep">›</span>')}</div>` : ''}
          <div class="title">
            ${it.url ? `<a href="${escapeHtml(it.url)}" target="_blank" rel="noopener">${escapeHtml(it.title || it.url)}</a>` : escapeHtml(it.title || '(無標題)')}
          </div>
          ${it.note ? `<div class="note ${isLong?'collapsed':''}" id="${noteId}">${escapeHtml(it.note)}</div>` : ''}
          ${(it.note && isLong) ? `<span class="note-toggle" data-target="${noteId}">展開</span>` : ''}
          <div class="meta">
            <div class="tags">
              ${it.saver ? `<span class="tag saver-tag">${it.saver==='小雞毛'?'🐤':'🤍'} ${escapeHtml(it.saver)}</span>` : ''}
            </div>
            <div class="actions">
              <button class="edit-btn">編輯</button>
              <button class="ghost del-btn">刪除</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;}).join('');

  list.querySelectorAll('.card').forEach(card=>{
    const id = card.dataset.id;
    card.querySelector('.edit-btn').addEventListener('click', ()=> openModal(id));
    card.querySelector('.del-btn').addEventListener('click', async ()=>{
      if(confirm('確定要刪除這項收藏嗎？')){
        items = items.filter(it=>it.id!==id);
        render();
        setSyncStatus('☁️ 刪除中…');
        try{
          await sbDelete(id);
          setSyncStatus('✓ 已同步');
        }catch(e){
          console.error(e);
          setSyncStatus('⚠️ 同步失敗', true);
        }
      }
    });
    card.querySelector('.pin-btn').addEventListener('click', async ()=>{
      const it = items.find(i=>i.id===id);
      it.pinned = !it.pinned;
      render();
      setSyncStatus('☁️ 儲存中…');
      try{
        await sbUpsert(it);
        setSyncStatus('✓ 已同步');
      }catch(e){
        console.error(e);
        setSyncStatus('⚠️ 同步失敗', true);
      }
    });
    card.querySelector('.visit-btn').addEventListener('click', async ()=>{
      const it = items.find(i=>i.id===id);
      it.visited = !it.visited;
      render();
      setSyncStatus('☁️ 儲存中…');
      try{
        await sbUpsert(it);
        setSyncStatus('✓ 已同步');
      }catch(e){
        console.error(e);
        setSyncStatus('⚠️ 同步失敗', true);
      }
    });
    const toggle = card.querySelector('.note-toggle');
    if(toggle){

    });
  });
}

/* ============ Category Tree ============ */
function getCatTree(){
  // returns { cat1: { cat2: Set(cat3...) } }
  const tree = {};
  items.forEach(it=>{
    if(!it.cat1) return;
    if(!tree[it.cat1]) tree[it.cat1] = {};
    if(it.cat2){
      if(!tree[it.cat1][it.cat2]) tree[it.cat1][it.cat2] = new Set();
      if(it.cat3) tree[it.cat1][it.cat2].add(it.cat3);
    }
  });
  return tree;
}

function populateCatSelects(cat1Val, cat2Val){
  const tree = getCatTree();
  const sel1 = document.getElementById('f_cat1_select');
  const sel2 = document.getElementById('f_cat2_select');
  const sel3 = document.getElementById('f_cat3_select');

  // Populate cat1
  const cat1s = Object.keys(tree).sort();
  sel1.innerHTML = `<option value="">選擇已有大類…</option>` +
    cat1s.map(c=>`<option value="${escapeHtml(c)}" ${cat1Val===c?'selected':''}>${escapeHtml(c)}</option>`).join('');

  // Show/populate cat2
  const cat2Field = document.getElementById('cat2Field');
  const cat1Input = document.getElementById('f_cat1');
  const effectiveCat1 = cat1Val || cat1Input.value.trim();

  if(effectiveCat1 && tree[effectiveCat1]){
    const cat2s = Object.keys(tree[effectiveCat1]).sort();
    sel2.innerHTML = `<option value="">選擇已有中類…</option>` +
      cat2s.map(c=>`<option value="${escapeHtml(c)}" ${cat2Val===c?'selected':''}>${escapeHtml(c)}</option>`).join('');
    cat2Field.style.display = '';
  }else if(effectiveCat1){
    sel2.innerHTML = `<option value="">選擇已有中類…</option>`;
    cat2Field.style.display = '';
  }else{
    cat2Field.style.display = 'none';
    document.getElementById('cat3Field').style.display = 'none';
    return;
  }

  // Show/populate cat3
  const cat3Field = document.getElementById('cat3Field');
  const cat2Input = document.getElementById('f_cat2');
  const effectiveCat2 = cat2Val || cat2Input.value.trim();

  if(effectiveCat2){
    const cat3s = (tree[effectiveCat1] && tree[effectiveCat1][effectiveCat2])
      ? [...tree[effectiveCat1][effectiveCat2]].sort()
      : [];
    sel3.innerHTML = `<option value="">選擇已有小類…</option>` +
      cat3s.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    cat3Field.style.display = '';
  }else{
    cat3Field.style.display = 'none';
  }
}

function bindCatEvents(){
  const sel1 = document.getElementById('f_cat1_select');
  const sel2 = document.getElementById('f_cat2_select');
  const sel3 = document.getElementById('f_cat3_select');
  const inp1 = document.getElementById('f_cat1');
  const inp2 = document.getElementById('f_cat2');
  const inp3 = document.getElementById('f_cat3');

  sel1.addEventListener('change', ()=>{
    inp1.value = sel1.value;
    sel1.value = '';
    populateCatSelects(inp1.value, null);
    inp2.value = '';
    inp3.value = '';
  });
  sel2.addEventListener('change', ()=>{
    inp2.value = sel2.value;
    sel2.value = '';
    populateCatSelects(inp1.value, inp2.value);
    inp3.value = '';
  });
  sel3.addEventListener('change', ()=>{
    inp3.value = sel3.value;
    sel3.value = '';
  });
  inp1.addEventListener('input', ()=>{
    populateCatSelects(inp1.value, inp2.value);
  });
  inp2.addEventListener('input', ()=>{
    populateCatSelects(inp1.value, inp2.value);
  });
}

function checkDuplicateUrl(url, ignoreId){
  const hint = document.getElementById('dupHint');
  if(!url){ hint.textContent=''; hint.classList.remove('dup-hint'); return; }
  const dup = items.find(it=>it.url===url && it.id!==ignoreId);
  if(dup){
    hint.textContent = `⚠️ 你已經存過這篇了：「${dup.title || dup.url}」`;
    hint.classList.add('dup-hint');
  }else{
    hint.textContent='';
    hint.classList.remove('dup-hint');
  }
}

function openModal(id){
  editingId = id || null;
  const overlay = document.getElementById('overlay');
  if(id){
    const it = items.find(i=>i.id===id);
    document.getElementById('modalTitle').textContent = '編輯收藏';

    document.getElementById('f_cat2').value = it.cat2 || '';

    populateCatSelects(it.cat1, it.cat2);
  }else{
    document.getElementById('modalTitle').textContent = '新增收藏';
    document.getElementById('f_title').value = '';
    document.getElementById('f_url').value = '';
    document.getElementById('f_note').value = '';
    document.getElementById('f_date').value = toDateInputValue(Date.now());

    document.getElementById('cat3Field').style.display = 'none';

    populateCatSelects(null, null);
    if(navigator.clipboard && navigator.clipboard.readText){
      navigator.clipboard.readText().then(text=>{
        const trimmed = (text||'').trim();
        if(/^https?:\/\/\S+$/i.test(trimmed)){
          document.getElementById('f_url').value = trimmed;
          checkDuplicateUrl(trimmed, editingId);

      }).catch(()=>{});

function closeModal(){

async function saveEntry(){
  const title = document.getElementById('f_title').value.trim();
  const url = document.getElementById('f_url').value.trim();
  const note = document.getElementById('f_note').value.trim();
  const dateVal = document.getElementById('f_date').value;
  const saver = document.getElementById('f_saver').value;
  const cat1 = document.getElementById('f_cat1').value.trim() || null;
  const cat2 = document.getElementById('f_cat2').value.trim() || null;
  const cat3 = document.getElementById('f_cat3').value.trim() || null;

  if(!title && !url){
    alert('請至少填寫標題或連結');
    return;
  }

  let savedItem;
  if(editingId){
    const it = items.find(i=>i.id===editingId);
    it.title = title; it.url = url; it.note = note;
    it.createdAt = dateInputToTimestamp(dateVal, it.createdAt);
    it.saver = saver;
    it.cat1 = cat1; it.cat2 = cat2; it.cat3 = cat3;
    it.cover = currentCover;
    savedItem = it;
  }else{
    savedItem = {
      id: uid(),
      title, url, note, tags: [],
      pinned: false,
      visited: false,
      saver,
      cat1, cat2, cat3,
      cover: currentCover,
      createdAt: dateInputToTimestamp(dateVal, Date.now())
    };
    items.push(savedItem);
  }
  if(saver){
    localStorage.setItem(LAST_SAVER_KEY, saver);
  }
  closeModal();
  render();
  setSyncStatus('☁️ 儲存中…');
  try{
    await sbUpsert(savedItem);
    setSyncStatus('✓ 已同步');
  }catch(e){
    console.error(e);
    setSyncStatus('⚠️ ' + e.message, true);
  }
}

function getExportItems(category){
  const sorted = [...items].sort((a,b)=> (b.pinned?1:0)-(a.pinned?1:0) || b.createdAt - a.createdAt);

  return sorted.filter(it=> it.cat1 === category);
}

// Generate a QR code as a PNG data URL using qrcodejs (renders into a hidden offscreen div)
function generateQrDataUrl(text){
  return new Promise((resolve)=>{
    if(!text || typeof QRCode === 'undefined'){
      resolve(null);
      return;
    }
    const holder = document.createElement('div');
    holder.style.position = 'fixed';
    holder.style.left = '-9999px';
    holder.style.top = '-9999px';
    document.body.appendChild(holder);
    try{
      new QRCode(holder, {
        text: text,
        width: 160,
        height: 160,
        colorDark: '#3A4A5C',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      // qrcodejs renders synchronously into a canvas or img
      setTimeout(()=>{
        let dataUrl = null;
        const canvas = holder.querySelector('canvas');
        const img = holder.querySelector('img');
        if(canvas){
          dataUrl = canvas.toDataURL('image/png');
        }else if(img && img.src){
          dataUrl = img.src;
        }
        document.body.removeChild(holder);
        resolve(dataUrl);
      }, 50);
    }catch(e){
      console.error('QR generation failed', e);
      document.body.removeChild(holder);
      resolve(null);
    }
  });
}

/* ---- PDF Export ---- */
async function exportPdf(){
  if(items.length===0){ alert('還沒有任何收藏可以匯出'); return; }
  if(typeof jspdf === 'undefined'){ alert('PDF 元件載入失敗，請檢查網路後重新整理再試'); return; }

  const category = await pickExportCategory();
  if(category === undefined) return; // cancelled
  const sorted = getExportItems(category);
  if(sorted.length===0){ alert('這個分類目前沒有資料'); return; }

  setExportProgress('☁️ 準備中…');
  const { jsPDF } = jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  const margin = 40;
  const qrSize = 70;
  let y = margin;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.text('Thread Collection' + (category ? ` / ${category}` : '') + '   ' + new Date().toLocaleDateString(), margin, y);
  y += 28;

  for(let i=0; i<sorted.length; i++){
    const it = sorted[i];
    setExportProgress(`☁️ 匯出 PDF 中… (${i+1}/${sorted.length})`);

    const blockHeight = Math.max(qrSize, 60) + 20;
    if(y + blockHeight > pageHeight - margin){
      doc.addPage();
      y = margin;
    }

    let qrData = null;
    if(it.url){
      try{ qrData = await generateQrDataUrl(it.url); }catch(e){}
    }

    const textX = margin + (qrData ? qrSize + 14 : 0);
    const textWidth = pageWidth - margin - textX;

    // Title
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    const title = it.title || it.url || '(無標題)';
    const titleLines = doc.splitTextToSize(title, textWidth);
    doc.text(titleLines, textX, y + 12);
    let textY = y + 12 + titleLines.length * 13;

    // Note
    if(it.note){
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      const noteLines = doc.splitTextToSize(it.note, textWidth);
      doc.text(noteLines, textX, textY + 4);
      textY += 4 + noteLines.length * 11;
    }

    // Category path + saver + date
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    const catPath = [it.cat1, it.cat2, it.cat3].filter(Boolean).join(' › ');
    const metaLine = [catPath, it.saver, formatDate(it.createdAt)].filter(Boolean).join('   ·   ');
    doc.setTextColor(140,140,140);
    doc.text(metaLine, textX, textY + 12);
    doc.setTextColor(0,0,0);

    // QR code image
    if(qrData){
      try{
        doc.addImage(qrData, 'PNG', margin, y, qrSize, qrSize);
      }catch(e){ console.error('addImage failed', e); }
    }

    const rowHeight = Math.max(qrSize, textY + 20 - y);
    y += rowHeight + 14;
    doc.setDrawColor(220,220,220);
    doc.line(margin, y - 7, pageWidth - margin, y - 7);
  }

  doc.save(`Thread收藏_${formatDate(Date.now())}.pdf`);
  setExportProgress(null);
}

/* ---- JPEG Export ---- */
async function exportJpeg(){
  if(items.length===0){ alert('還沒有任何收藏可以匯出'); return; }

  const category = await pickExportCategory();
  if(category === undefined) return;
  const sorted = getExportItems(category);
  if(sorted.length===0){ alert('這個分類目前沒有資料'); return; }

  setExportProgress('☁️ 準備中…');

  const width = 800;
  const padding = 30;
  const lineHeight = 24;
  const titleLineHeight = 28;
  const itemGap = 24;

  // First pass: measure heights using a temporary canvas
  const measureCanvas = document.createElement('canvas');
  const mctx = measureCanvas.getContext('2d');

  function wrapText(ctx, text, maxWidth){
    const lines = [];
    (text||'').split('\n').forEach(paragraph=>{
      if(paragraph === ''){ lines.push(''); return; }
      let line = '';
      for(const ch of paragraph){
        const test = line + ch;
        if(mctx.measureText(test).width > maxWidth && line !== ''){
          lines.push(line);
          line = ch;
        }else{
          line = test;
        }
      }
      if(line) lines.push(line);
    });
    return lines;
  }

  const contentWidth = width - padding*2;
  const itemBlocks = sorted.map(it=>{
    mctx.font = 'bold 18px sans-serif';
    const titleLines = wrapText(mctx, it.title || it.url || '(無標題)', contentWidth);
    mctx.font = '14px sans-serif';
    const noteLines = it.note ? wrapText(mctx, it.note, contentWidth) : [];
    const tagsLine = [...(it.tags||[]), it.saver].filter(Boolean).join('   ·   ');
    let h = titleLines.length * titleLineHeight;
    if(noteLines.length) h += noteLines.length * lineHeight + 4;
    if(tagsLine || it.url) h += lineHeight;
    h += lineHeight; // date
    return { it, titleLines, noteLines, tagsLine, height: h };
  });

  const totalHeight = padding*2 + 60 /* header */ + itemBlocks.reduce((s,b)=>s+b.height+itemGap, 0);

  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = Math.min(totalHeight, 32000); // canvas height safety cap
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#F3F8FD';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let y = padding;
  ctx.fillStyle = '#5A9BD4';
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText('Thread收藏✐☡', padding, y + 24);
  y += 36;
  ctx.fillStyle = '#94ABBE';
  ctx.font = '12px sans-serif';
  ctx.fillText(`匯出於 ${formatDate(Date.now())} · 共 ${items.length} 筆`, padding, y + 12);
  y += 36;

  for(let i=0; i<itemBlocks.length; i++){
    setExportProgress(`☁️ 匯出 JPEG 中… (${i+1}/${itemBlocks.length})`);
    const block = itemBlocks[i];
    if(y + block.height > canvas.height - padding){
      break; // stop if exceeding canvas (safety cap reached)
    }

    // Card background
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeStyle = '#D9E9F7';
    ctx.lineWidth = 2;
    const cardPad = 14;
    const cardHeight = block.height + cardPad*2;
    roundRect(ctx, padding, y, contentWidth + cardPad*2 - 28, cardHeight, 14);
    ctx.fill();
    ctx.stroke();

    let ty = y + cardPad + 18;
    ctx.fillStyle = '#3A4A5C';
    ctx.font = 'bold 18px sans-serif';
    block.titleLines.forEach(line=>{
      ctx.fillText(line, padding + cardPad, ty);
      ty += titleLineHeight;
    });

    if(block.noteLines.length){
      ctx.fillStyle = '#8A9AAB';
      ctx.font = '14px sans-serif';
      ty += 2;
      block.noteLines.forEach(line=>{
        ctx.fillText(line, padding + cardPad, ty);
        ty += lineHeight;
      });
    }

    if(block.tagsLine){
      ctx.fillStyle = '#5A9BD4';
      ctx.font = '12px sans-serif';
      ty += 6;
      ctx.fillText(block.tagsLine, padding + cardPad, ty);
      ty += lineHeight - 6;
    }

    ctx.fillStyle = '#AAB8C4';
    ctx.font = '11px sans-serif';
    ty += 6;
    ctx.fillText(formatDate(block.it.createdAt), padding + cardPad, ty);

    y += cardHeight + itemGap;
  }

  // Trim canvas to actual used height
  const finalCanvas = document.createElement('canvas');
  finalCanvas.width = width;
  finalCanvas.height = Math.min(y + padding, canvas.height);
  const fctx = finalCanvas.getContext('2d');
  fctx.drawImage(canvas, 0, 0);

  finalCanvas.toBlob((blob)=>{
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Thread收藏_${formatDate(Date.now())}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setExportProgress(null);
  }, 'image/jpeg', 0.92);
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

async function exportHtml(){
  if(items.length===0){

    groups[cat].push(it);
  });
  const cats = Object.keys(groups).sort();

  const sectionsHtml = cats.map(cat=>{

            <span class="s-date">${formatDate(it.createdAt)}</span>

        </div>

function exportData(){
  const blob = new Blob([JSON.stringify(items, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);

function importData(file){
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!Array.isArray(data)) throw new Error('格式錯誤');
      const valid = data.filter(d=>d && typeof d==='object');
      if(items.length>0){
        if(!confirm(`匯入 ${valid.length} 筆資料嗎？這會加到目前的清單後面（不會覆蓋現有資料）。`)) return;
      }
      const newItems = valid.map(d=>({
        id: d.id || uid(),
        title: d.title || '',
        url: d.url || '',
        note: d.note || '',
        tags: Array.isArray(d.tags) ? d.tags : [],
        pinned: !!d.pinned,
        visited: !!d.visited,
        cat1: d.cat1 || null,
        cat2: d.cat2 || null,
        cat3: d.cat3 || null,
        saver: d.saver || '',
        cover: d.cover || null,
        createdAt: d.createdAt || Date.now()
      }));
      newItems.forEach(it=>items.push(it));
      render();
          setSyncStatus('☁️ 匯入中…');
      try{
        await sbUpsertMany(newItems);
        setSyncStatus('✓ 已同步');
        alert('匯入完成！');
      }catch(err){
        console.error(err);
        setSyncStatus('⚠️ 同步失敗', true);
        alert('匯入完成，但雲端同步失敗，請檢查網路後重新整理');
      }
    }catch(err){
      alert('匯入失敗：檔案格式不正確');
    }
  };
  reader.readAsText(file);
}

/* ============ Random Review ============ */
function showRandomReview(){
  if(items.length === 0){
    alert('還沒有收藏可以回顧喔～');
    return;
  }
  const it = items[Math.floor(Math.random() * items.length)];
  const card = document.getElementById('reviewCard');
  card.innerHTML = `
    <div class="eyebrow">隨機回顧</div>
    <h3>${it.url ? `<a href="${escapeHtml(it.url)}" target="_blank" rel="noopener">${escapeHtml(it.title || it.url)}</a>` : escapeHtml(it.title || '(無標題)')}</h3>
    ${it.note ? `<div class="note">${escapeHtml(it.note)}</div>` : ''}
    ${(it.tags && it.tags.length) ? `<div class="tags">${it.tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : (it.cat1 ? `<div class="tags"><span class="tag">${[it.cat1,it.cat2,it.cat3].filter(Boolean).map(escapeHtml).join(' › ')}</span></div>` : '')}
    <div class="actions">
      <button class="ghost" id="reviewClose">關閉</button>
      <button class="random" id="reviewAgain">🎲 再抽一個</button>
    </div>
  `;
  document.getElementById('reviewOverlay').classList.add('show');

}

  if(e.key==='Escape'){
    closeModal();
    document.getElementById('reviewOverlay').classList.remove('show');
  }
  if(e.key==='Enter' && e.ctrlKey && document.getElementById('overlay').classList.contains('show')) saveEntry();

  // Quick-add shortcut: "/" opens the add modal, unless typing in a field
  if(e.key==='/' && !document.getElementById('overlay').classList.contains('show')){
    const tag = document.activeElement.tagName;
    if(tag !== 'INPUT' && tag !== 'TEXTAREA'){
      e.preventDefault();
      openModal(null);
    }
  }
});


/* ============ Theme ============ */
const THEME_KEY = 'thread-collector-theme';
function applyTheme(theme){
  if(theme === 'dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeToggle').textContent = '☀️';
  }else{
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('themeToggle').textContent = '🌙';
  }
}
function loadTheme(){
  const saved = localStorage.getItem(THEME_KEY);
  applyTheme(saved === 'dark' ? 'dark' : 'light');
}
document.getElementById('themeToggle').addEventListener('click', ()=>{
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
});

loadTheme();
render();
load().then(()=>{
  render();
});
